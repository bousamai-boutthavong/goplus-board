/* ============================================================================
   DRILL-DOWN MODALS (เพิ่ม · reuse pattern openWallet/openCust · ไม่แตะ logic เดิม)
   ทุก modal: header + list (chip › คลิกต่อ) + ลิงก์ข้ามชั้น → ไม่มี dead-end
   ============================================================================ */

/* ---------- openBottles() — ถังเปล่ารับคืน มาจากจุดไหนบ้าง (sum ตรง RUN.bottles) ----------
   source = STOPS ที่ส่งแล้ว (done) + ในรอบ มี bottle · คลิกจุด → openCust (ดูถังค้าง/ประวัติ) */
function openBottles(){
  // T5: บรรจุภัณฑ์คืนแยกประเภท (ถัง·ลัง·แพัก) · ใช้ ret per-stop · sum ต่อประเภท
  const stopRet=s=>s.ret||seedRet(s.items);
  const collected=STOPS.filter(s=>s.status==='done'&&retSum(stopRet(s))>0);
  const pending=STOPS.filter(s=>s.status!=='done'&&retSum(stopRet(s))>0);
  const doneTot=retDone(); // sum แยกประเภท จุด done (ตรง hero)
  const row=(s,tag)=>{const r=stopRet(s);
    return `<div class="report-line" onclick="closeM();openCust('${s.nm.replace(/'/g,"\\'")}')" style="cursor:pointer">
    <div class="lab"><div class="ic" style="background:var(--blue-soft);color:var(--blue)">${I.bottle}</div>
      <div>${s.nm}<div class="pdesc mono">${s.time?s.time:'ຍັງບໍ່ສົ່ງ'} · ${s.id}</div></div></div>
    <div class="vv" style="font-size:12.5px">${retLabel(r)} ${tag||''} <span style="color:var(--muted-2);font-weight:400">›</span></div></div>`;};
  // แถบสรุปแยกประเภท (เฉพาะที่ >0) — sum ต่อประเภทตรง
  const typeSummary=RETKEYS.filter(k=>doneTot[k]>0).map(k=>{const m=RETMETA[k];
    return `<div class="report-line"><div class="lab"><div class="ic" style="background:var(--blue-soft);color:var(--blue-ink)">${I[m.ic]}</div><div>${m.lab}<div class="pdesc">ຮັບຄືນແລ້ວ (${m.unit})</div></div></div>
      <div class="vv">${doneTot[k]} ${m.unit}</div></div>`;}).join('');
  modal(`<span class="chip c-transfer">${I.bottle} ບັນຈຸພັນຄືນ</span>`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>ນັບບັນຈຸພັນຄືນຈາກລູກຄ້າ ແຍກປະເພດ (ຖັງ · ລັງ · ແພັກ) · ແຕະຈຸດເພື່ອເບິ່ງລູກຄ້າ</span></p>
     ${typeSummary?`<div class="sec-label" style="margin-top:6px">ສະຫຼຸບແຍກປະເພດ (ຮັບຄືນແລ້ວ)</div>`+typeSummary:''}
     ${collected.length?`<div class="sec-label">ຮັບຄືນແລ້ວມື້ນີ້ · ຕາມຈຸດ</div>`+collected.map(s=>row(s)).join(''):''}
     ${pending.length?`<div class="sec-label">ຍັງລໍຮັບຄືນ</div>`+pending.map(s=>row(s,'<span style="color:var(--muted-2)">(ລໍ)</span>')).join(''):''}
     <div class="report-line total"><div class="lab"><b>ຮັບຄືນແລ້ວ</b></div><div class="vv" style="font-size:14px">${retLabel(doneTot)}</div></div>`,
    `<button class="btn" onclick="closeM()">ປິດ</button>
     <button class="btn primary" onclick="closeM();openRunStops()">${I.clip} ເບິ່ງທຸກຈຸດສົ່ງ</button>`);
}

/* ---------- openRunStops() — รายการจุดส่งทั้งหมดวันนี้ (hub วน loop) ----------
   คลิกจุด → openStop (full page · มี openCust hook ในนั้น) · ลิงก์→wallet/bottles
   นี่คือ hub กลาง: เข้าได้จาก run ring/money/bottles → ออกไป stop → cust → จุดอื่น */
function openRunStops(){
  const order=['now','pending','failed','done'];
  const list=[...STOPS].sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status)||a.dist-b.dist);
  const stChip=s=>s.status==='done'?`<span class="chip c-ok">${I.check} ${s.time||''}</span>`
    :s.status==='now'?`<span class="chip c-warn">${I.pin} ກຳລັງໄປ</span>`
    :s.status==='failed'?`<span class="chip c-credit">${I.x} ສົ່ງບໍ່ໄດ້</span>`
    :`<span class="chip c-neutral">${I.clock} ລໍ</span>`;
  modal(`<span style="display:flex;align-items:center;gap:8px">${I.clip} ຈຸດສົ່ງມື້ນີ້ · ${STOPS.length} ຈຸດ</span>`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>ສຳເລັດ ${STOPS.filter(s=>s.status==='done').length} · ຍັງ ${STOPS.filter(s=>s.status!=='done').length} · ແຕະຈຸດເພື່ອເປີດລາຍລະອຽດສົ່ງ</span></p>
     ${list.map(s=>{const pm=PAYMETA[s.pay];
       return `<div class="report-line" onclick="closeM();openStop('${s.id}')" style="cursor:pointer">
         <div class="lab" style="flex-direction:column;align-items:flex-start;gap:3px">
           <span style="color:var(--ink);font-weight:600">${s.nm}</span>
           <span style="display:flex;gap:5px;flex-wrap:wrap">${stChip(s)}<span class="chip ${pm.cls}">${I[pm.ic]} ${pm.lab}</span>${retSum(s.ret||seedRet(s.items))?`<span class="tag-bottle">${I.bottle} ${retSum(s.ret||seedRet(s.items))}</span>`:''}</span></div>
         <div class="vv">${kip(s.amt)} ₭ <span style="color:var(--muted-2);font-weight:400">›</span></div></div>`;}).join('')}
     <div class="report-line total"><div class="lab"><b>ຍອດລວມ</b></div><div class="vv">${kip(STOPS.reduce((a,s)=>a+s.amt,0))} ₭</div></div>`,
    `<button class="btn" onclick="closeM()">ປິດ</button>
     <button class="btn primary" onclick="closeM();go('map')">${I.nav} ເບິ່ງແຜນທີ່</button>`);
}

/* ---------- openLeaderboard() — ตารางอันดับเต็ม (คลิกคนขับ → openDriver) ---------- */

  modal(`<span style="display:flex;align-items:center;gap:8px">${I.trophy} ອັນດັບທີມສົ່ງ (ອາທິດນີ້)</span>`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>30 ທີມ · ສະແດງ Top 5 · ແຕະຄົນຂັບເພື່ອເບິ່ງລາຍລະອຽດ · ກະຕິກາຊຸດດຽວກັບຫຼັງບ້ານ</span></p>
     ${LB.map(d=>`<div class="lrow ${d.me?'me':''}" onclick="closeM();openDriver('${d.nm.replace(/'/g,"\\'")}')" style="cursor:pointer">
       <div class="rank ${d.r<=3?'r'+d.r:''}">${d.r}</div>
       <div style="flex:1"><b style="font-size:13.5px">${d.nm}${d.me?' <span class="pdesc" style="color:var(--primary-ink)">(ຂ້ອຍ)</span>':''}</b>
         <div class="pdesc mono">${d.plate} · ${d.stops} ຈຸດ · streak ${d.streak} ມື້</div></div>
       <div style="display:flex;align-items:center;gap:7px"><span class="mono" style="font-weight:700">${kip(d.pts)}</span><span style="color:var(--muted-2)">›</span></div>
     </div>`).join('')}`,
    `<button class="btn" onclick="closeM()">ປິດ</button>
     <button class="btn primary" onclick="closeM();openPoints()">${I.star} ແຕ້ມຂອງຂ້ອຍ</button>`);
}

/* ---------- redeemReward(ชื่อ,ราคา) — แลกของรางวัล: เช็คแต้มพอ → ส่งคำขอ · ไม่พอ → บอกขาดเท่าไร ---------- */
const MYPTS=1090; // แต้มสะสมปัจจุบัน (ตรง gami/me · single source)
function redeemReward(nm,cost){
  if(MYPTS>=cost){toast('ສົ່ງຄຳຂໍແລກ "'+nm+'" → ຫົວໜ້າອະນຸມັດ');}
  else{toast('ແຕ້ມບໍ່ພໍ (ຂາດ '+kip(cost-MYPTS)+' ແຕ້ມ)');}
}

/* ---------- openPoints() — ประวัติได้/หักแต้มวันนี้ (sum=1,090) + ลิงก์กติกา ---------- */
/* แมป lab แต้ม → จุดหมาย drill (เช็ค keyword · ไม่แตะ data POINTS) · ไม่ตรง=null=static */
function pointGo(lab){
  if(/×18|POD/.test(lab))return 'closeM();openRunStops()';        // ส่งสำเร็จ ×18 → ทุกจุดส่ง
  if(/ລູກຄ້າໃໝ່/.test(lab))return 'closeM();openRunStops()';      // พบลูกค้าใหม่ → จุดส่ง
  if(/ຖັງ/.test(lab))return 'closeM();openBottles()';             // นับถัง → ถังรับคืน
  if(/ກວດລົດ/.test(lab))return 'closeM();openInspect()';          // ตรวจรถ → หน้าตรวจรถ
  return null; // streak / หักมาช้า / สะสมรอบก่อน = ไม่มี target → static
}
function openPoints(){
  const sum=POINTS.reduce((a,p)=>a+p.pt,0);
  modal(`<span style="display:flex;align-items:center;gap:8px">${I.star} ປະຫວັດແຕ້ມ · ${kip(sum)} ແຕ້ມ</span>`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>ໄດ້/ຫັກແຕ້ມ · ນັບຈາກວຽກທີ່ລະບົບຢືນຢັນ (ຮູບ+ພິກັດ) · ໃຊ້ແລກຂອງລາງວັນໄດ້</span></p>
     ${POINTS.map(p=>{const g=pointGo(p.lab);
       return `<div class="report-line"${g?` onclick="${g}" style="cursor:pointer"`:''}>
       <div class="lab"><div class="ic" style="background:${p.type==='gain'?'var(--green-soft)':'var(--red-soft)'};color:${p.type==='gain'?'var(--green-ink)':'var(--red-ink)'}">${p.type==='gain'?I.plus:I.x}</div>
         <div>${p.lab}<div class="pdesc">${p.t}</div></div></div>
       <div class="vv" style="color:${p.type==='gain'?'var(--green-ink)':'var(--red-ink)'}">${p.pt>0?'+':''}${kip(p.pt)}${g?' <span style="color:var(--muted-2);font-weight:400">›</span>':''}</div></div>`;}).join('')}
     <div class="report-line total"><div class="lab"><b>ລວມແຕ້ມ</b></div><div class="vv">${kip(sum)} ແຕ້ມ</div></div>`,
    `<button class="btn" onclick="closeM()">ປິດ</button>
     <button class="btn primary" onclick="closeM();openLeaderboard()">${I.trophy} ເບິ່ງອັນດັບ</button>`);
}

/* ---------- openDriver(name) — คนขับ detail (อันดับ·แต้ม·จุดส่ง·ความพอใจ SVG face) ----------
   reuse satSVG/SAT · ถ้าเป็นเราเอง (me) → ลิงก์ไปประวัติแต้ม · คนอื่น → กลับ leaderboard */
function openDriver(name){
  const d=LB.find(x=>x.nm===name)||LB[0];
  const sv=SAT[d.sat]||SAT[2];
  const isMe=!!d.me;
  modal(
    `<div style="display:flex;align-items:center;gap:9px"><div class="rank ${d.r<=3?'r'+d.r:''}" style="width:34px;height:34px">${d.r}</div>
       <div><div style="font-weight:700;font-size:15px">${d.nm}</div><div class="pdesc mono">${d.plate}</div></div></div>`,
    `<div style="display:flex;gap:7px;margin:-2px 0 12px"><span class="chip c-neutral">${I.truck} ຄົນຂັບ</span>
       ${isMe?`<span class="chip c-ok">${I.user} ນີ້ແມ່ນຂ້ອຍ</span>`:''}</div>
     <div class="hbar" style="margin-top:0">
       <div class="hstat"><div class="l">ອັນດັບ</div><div class="v">#${d.r} <small>/ 30</small></div></div>
       <div class="hstat"><div class="l">ແຕ້ມ</div><div class="v">${kip(d.pts)}</div></div>
     </div>
     <div class="sec-label">ສະຖິຕິອາທິດນີ້</div>
     <div class="card" style="padding:4px 13px">
       <div class="kv"${isMe?` onclick="closeM();openRunStops()" style="cursor:pointer"`:''}><span>ຈຸດສົ່ງສຳເລັດ${isMe?' ›':''}</span><b class="mono">${d.stops} ຈຸດ</b></div>
       <div class="kv"><span>ມາກະຕໍ່ເນື່ອງກັນ (streak)</span><b class="mono">${d.streak} ມື້</b></div>
       <div class="kv" style="border:0"><span>ຄວາມພໍໃຈລູກຄ້າ (ສະເລ່ຍ)</span>
         <b style="display:flex;align-items:center;gap:7px;color:${sv.c}"><span style="width:22px;height:22px;display:inline-grid;place-items:center">${satSVG(d.sat)}</span>${sv.lab}</b></div>
     </div>
     <div class="hint" style="margin-top:10px">${I.alert}<span>ຄະແນນຄິດຈາກກະຕິກາ Leaderboard ຫຼັງບ້ານ (P2-1) · ຫົວໜ້າປັບໄດ້ຕໍ່ tenant</span></div>`,
    `<button class="btn" onclick="closeM();openLeaderboard()">${I.back} ກັບອັນດັບ</button>
     ${isMe?`<button class="btn primary" onclick="closeM();openPoints()">${I.star} ປະຫວັດແຕ້ມ</button>`:`<button class="btn primary" onclick="closeM();openLeaderboard()">${I.trophy} ອັນດັບ</button>`}`);
}

  </div>
  <div class="card" style="margin-top:12px">
    <div class="kv" onclick="openBottles()" style="cursor:pointer"><span>ບັນຈຸພັນຄືນ ›</span><b class="mono">${retLabel(retDone())}</b></div>
    <div class="kv" style="border:0;cursor:pointer" onclick="openRunStops()"><span>ສົ່ງສຳເລັດ ›</span><b class="mono">${RUN.done} / ${RUN.total} ຈຸດ</b></div>
  </div>
  <div class="card" style="margin-top:12px;border-color:#1d5236;background:var(--green-soft)">
    <div style="display:flex;gap:10px;align-items:flex-start">
      <div class="ceic" style="color:var(--green-ink);margin-top:1px">${I.alert}</div>
      <div style="font-size:12.5px;color:var(--green-ink);line-height:1.6">
        <b>ເງິນສົດໃນມື ${kip(RUN.cash)} ₭</b><br>
        ປິດກະ → ສົ່ງມອບເງິນສົດ + ລາຍງານເຂົ້າຫົວໜ້າສາຂາອັດຕະໂນມັດ</div>
    </div>

  <button class="btn primary lg" style="margin-top:16px" onclick="go('me')">${I.send} ໄປໜ້າປິດກະ</button>`;
};

/* ============================================================
   งาน A — โหมดขับรถ (driving mode)
   full-screen minimal · ลดทุกอย่างเหลือจำเป็น · ปุ่มใหญ่ · ตาถนน
   reuse logic เดิม 100%: navStop() + openStop() · ไม่แตะ flow เดิม
   ============================================================ */
const VOICE_KEY='loo_driver_voice'; // จำเปิด/ปิดเสียง (default = เปิด)
function voiceOn(){try{return localStorage.getItem(VOICE_KEY)!=='off';}catch(e){return true;}}

/* จุดที่ "now" (กำลังไป) — ถ้าไม่มีก็ j. pending ใกล้สุด · ถ้าครบแล้ว = null */
function driveNextStop(){
  return STOPS.find(s=>s.status==='now')
      || [...STOPS].filter(s=>s.status==='pending').sort((a,b)=>a.dist-b.dist)[0]
      || null;
}

function openDrive(){
  renderDrive();
  $('drive').classList.add('show');
  if(voiceOn())speakNext(); // อ่านออกเสียงจุดต่อไปทันทีที่เข้าโหมด (ถ้าเปิดเสียง)
}
function closeDrive(){
  $('drive').classList.remove('show');
  try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(e){}
}

function renderDrive(){
  const s=driveNextStop();
  const von=voiceOn();
  const mid = s
    ? `<div class="drive-label">${I.pin} ຈຸດຕໍ່ໄປ</div>
       <div class="drive-name">${s.nm}</div>
       <div class="drive-dist"><span class="km">${s.dist}</span><span class="un">ກມ.</span></div>
       <div class="drive-addr">${I.pin}<span>${s.addr}</span></div>`
    : `<div class="drive-empty"><div class="big">${I.check}</div>ສົ່ງຄົບທຸກຈຸດແລ້ວ<br><span style="font-size:14px;color:var(--muted-2)">ກັບໄປປິດກະໄດ້ເລີຍ</span></div>`;
  const bot = s
    ? `<button class="drive-btn nav" onclick="driveNav()">${I.nav} ນຳທາງ</button>
       <button class="drive-btn arrive" onclick="driveArrive()">${I.check} ຮອດແລ້ວ · ເປີດຈຸດ</button>
       <button onclick="driveSkip()" style="margin-top:10px;width:100%;background:transparent;border:1px solid var(--line-2);color:var(--muted);border-radius:14px;padding:13px;font-size:15px;cursor:pointer">${I.chev} ຂ້າມຈຸດນີ້ໄປກ່ອນ</button>`
    : `<button class="drive-btn nav" onclick="closeDrive()">${I.back} ກັບໄປໜ້າວຽກ</button>`;
  $('drive').innerHTML=`
    <div class="drive-top">
      <div class="drive-prog">${I.truck}<span>ສົ່ງແລ້ວ <b>${RUN.done}/${RUN.total}</b></span></div>
      <div class="drive-acts">
        <div class="drive-ic ${von?'on':''}" id="driveVoiceBtn" onclick="toggleVoice()" title="ເປີດ/ປິດ ສຽງອ່ານ">${von?I.speaker:I.mute}</div>
        <div class="drive-ic" onclick="closeDrive()" title="ອອກໂໝດຂັບລົດ">${I.x}</div>
      </div>
    </div>
    <div class="drive-mid">${mid}</div>
    <div class="drive-bot">${bot}</div>`;
}

/* ปุ่มนำทาง — reuse navStop() เดิม (ต้อง set curStop ให้ตรงจุด now ก่อน) */
function driveNav(){
  const s=driveNextStop(); if(!s)return;
  curStop=s; // navStop() อ่าน curStop · set ให้ตรงจุดโหมดขับ
  navStop();
}
/* ถึงแล้ว → เปิดจุด: reuse openStop() เดิม (ออกจากโหมดขับก่อน กัน overlay ซ้อน) */
function driveArrive(){
  const s=driveNextStop(); if(!s)return;
  closeDrive();
  openStop(s.id); // flow เดิมทุกอย่าง (เลือกจ่าย/นับถัง/ถ่ายรูป/ยืนยัน)
}
/* ข้ามจุดนี้ไปก่อน (ลูกค้าไม่อยู่/ผ่านก่อน) → ดันจุดนี้ท้ายคิว + เลื่อนจุดถัดไปเป็น now */
function driveSkip(){
  const s=driveNextStop(); if(!s)return;
  s.status='pending'; s.dist=(parseFloat(s.dist)||0)+99;
  const nx=[...STOPS].filter(x=>x.status==='pending'&&x!==s).sort((a,b)=>(parseFloat(a.dist)||0)-(parseFloat(b.dist)||0))[0];
  if(nx)nx.status='now';
  renderDrive(); if(voiceOn())speakNext();
  toast('ຂ້າມຈຸດນີ້ໄປກ່ອນ · ສົ່ງທີຫຼັງ');
}

/* ============== อ่านออกเสียง (voice · guarded) ============== */
/* พยายาม lang lo-LA → ถ้าไม่มี voice ลาว fallback (browser เลือกเอง) · ไม่ throw */
function speakNext(){
  try{
    const synth=window.speechSynthesis;
    if(!synth||typeof SpeechSynthesisUtterance==='undefined')return; // browser ไม่รองรับ → เงียบ ไม่ error
    if(!voiceOn())return;
    const s=driveNextStop();
    const text = s
      ? 'ຈຸດຕໍ່ໄປ '+s.nm+' ໄລຍະ '+s.dist+' ກິໂລແມັດ'
      : 'ສົ່ງຄົບທຸກຈຸດແລ້ວ';
    synth.cancel(); // หยุดอันเก่าก่อน กันพูดซ้อน
    const u=new SpeechSynthesisUtterance(text);
    u.lang='lo-LA'; u.rate=.95;
    // เลือก voice ลาวถ้ามี · ไม่งั้นปล่อย default (fallback)
    try{
      const vs=synth.getVoices()||[];
      const lo=vs.find(v=>/^lo/i.test(v.lang));
      if(lo)u.voice=lo;
    }catch(e){}
    u.onerror=()=>{}; // กัน error event โผล่ console เป็น throw
    synth.speak(u);
  }catch(e){
    console.log('voice skipped:',e&&e.message); // guarded — ไม่ทำให้ทั้งแอปพัง
  }
}
function toggleVoice(){
  const next = voiceOn() ? 'off' : 'on';
  try{localStorage.setItem(VOICE_KEY,next);}catch(e){}
  // อัปเดตปุ่ม + พูดทันทีถ้าเพิ่งเปิด
  const von=(next==='on');
  const btn=$('driveVoiceBtn');
  if(btn){btn.classList.toggle('on',von);btn.innerHTML=von?I.speaker:I.mute;}
  if(von)speakNext();
  else{try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(e){}}
}

/* ============================================================
   งาน B — Tour สอนครั้งแรก (onboarding) · N3 SPOTLIGHT
   เจาะรูที่ element เป้าหมายจริง (เหมือน intro.js/shepherd) + tooltip ชี้ติด
   ============================================================ */
const ONBOARD_KEY='loo_driver_onboarded';
function isOnboarded(){try{return localStorage.getItem(ONBOARD_KEY)==='1';}catch(e){return false;}}
function setOnboarded(){try{localStorage.setItem(ONBOARD_KEY,'1');}catch(e){}}

/* 5 ขั้น — target = selector ของ element จริงบนหน้า "run" (เนื้อหา reuse ของเดิม) */

let tourStep=0;
function startTour(){
  if(SCREENS.run && document.querySelector('.tabbar button[data-tab="run"].on')==null){go('run');}
  tourStep=0;$('tour').classList.add('show');setTimeout(renderTour,60);
}
function renderTour(){
  const s=TOUR[tourStep];
  const last=(tourStep===TOUR.length-1);
  const el=document.querySelector(s.sel);
  if(!el){ // element ไม่อยู่ → ข้ามไปขั้นถัดไป (กัน tour ค้าง)
    if(!last){tourStep++;return renderTour();} return endTour();
  }
  el.scrollIntoView({block:'center',behavior:'auto'}); // ดึง element เข้าจอก่อนวัดตำแหน่ง
  setTimeout(()=>paintTour(el),el.getBoundingClientRect().top<0||el.getBoundingClientRect().bottom>innerHeight?260:0);
}
function paintTour(el){
  const s=TOUR[tourStep];
  const last=(tourStep===TOUR.length-1);
  const vr=el.getBoundingClientRect();
  // #tour absolute อยู่ใน .device (offset parent) → แปลงพิกัด viewport → พิกัดภายใน .device
  const dev=document.querySelector('.device').getBoundingClientRect();
  const r={top:vr.top-dev.top,left:vr.left-dev.left,width:vr.width,height:vr.height,
           bottom:vr.bottom-dev.top,right:vr.right-dev.left};
  const W=dev.width,H=dev.height; // ขอบเขตภายในกรอบ device
  const pad=6;
  const dots=TOUR.map((_,i)=>`<div class="td ${i===tourStep?'on':''}"></div>`).join('');
  // วาง tooltip ใต้ element ถ้ามีพื้นที่ ไม่งั้นวางบน
  const tipH=210, gap=14;
  const below=(r.bottom+gap+tipH)<H;
  $('tour').innerHTML=`
    <div class="tour-cut" style="top:${r.top-pad}px;left:${r.left-pad}px;width:${r.width+pad*2}px;height:${r.height+pad*2}px"></div>
    <div class="tour-tip ${below?'below':'above'}" id="ttip">
      <div class="tt-head">
        <div class="tt-ic">${I[s.ic]}</div>
        <div><div class="tt-step">ຂັ້ນທີ ${tourStep+1} / ${TOUR.length}</div><h2>${s.t}</h2></div>
      </div>
      <p>${s.d}</p>
      <div class="tour-dots">${dots}</div>
      <div class="tour-foot">
        <button class="tour-skip" onclick="endTour()">${I.x} ຂ້າມ</button>
        <button class="tour-next" onclick="tourNext()">${last?I.check+' ເລີ່ມໃຊ້ໄດ້ເລີຍ':'ຕໍ່ໄປ '+I.chev}</button>
      </div>
    </div>`;
  // จัดตำแหน่ง tooltip + ลูกศรชี้ให้ตรง element (พิกัดภายใน device)
  const tip=$('ttip');const tw=tip.offsetWidth,th=tip.offsetHeight;
  let top=below?(r.bottom+gap):(r.top-gap-th);
  top=Math.max(12,Math.min(top,H-th-12));
  let left=r.left+r.width/2-tw/2;
  left=Math.max(14,Math.min(left,W-tw-14));
  tip.style.top=top+'px';tip.style.left=left+'px';
  const arrow=Math.max(14,Math.min(r.left+r.width/2-left-6,tw-26));
  tip.style.setProperty('--arrow',arrow+'px');
}
function tourNext(){
  if(tourStep<TOUR.length-1){tourStep++;renderTour();}
  else endTour();
}
function endTour(){
  setOnboarded();
  $('tour').classList.remove('show');
  $('tour').innerHTML='';
}

      new QRCode(el,{text:payload,width:88,height:88,
        colorDark:'#15233b',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});

  el.innerHTML=RC_QR; // fallback: placeholder เดิม

        ${discRow}
        ${dep>0?`<div class="rc-sline"><span>ຄ່ານ້ຳ (ສຸດທິ)</span><span class="mono">${kip(s.amt)} ₭</span></div>
        <div class="rc-sline"><span>ຄ່າມັດຈຳບັນຈຸພັນ (ຄືນໄດ້)</span><span class="mono">+${kip(dep)} ₭</span></div>
        <div class="rc-tot"><span>ຍອດເກັບລວມ</span><span class="mono">${kip(s.amt+dep)} ₭</span></div>`
        :`<div class="rc-tot"><span>ສຸດທິ</span><span class="mono">${kip(s.amt)} ₭</span></div>`}
        <div class="rc-pay"><span>ການຊຳລະ</span><span>${pm.lab}</span></div>
        <div class="rc-pay"><span>ບັນຈຸພັນຄືນ</span><span>${ret}</span></div>
      </div>
      <div class="rc-qr" id="rcQR">${RC_QR}</div>
      <div class="rc-qrcap">${billNo}</div>
      <div class="rc-foot">ສະແກນ QR ເພື່ອກວດສອບບິນ · ຂອບໃຈທີ່ໃຊ້ບໍລິການ ${BIZ.name}</div>
    </div>`,
   `<button class="btn" onclick="closeM();toast('ສົ່ງໃບບິນໃຫ້ລູກຄ້າທາງ WhatsApp ແລ້ວ')">${I.send} ສົ່ງໃຫ້ລູກຄ້າ</button>
    <button class="btn primary" onclick="printReceipt()">${I.print} ພິມໃບບິນ</button>`);
  /* QR encode: VARI|เลขบิล|ยอดสุทธิ|วันที่ → สแกนได้จริง (ref บิล) */
  renderQR('rcQR','VARI|'+billNo+'|'+s.amt+'|'+dstr);
}
function printReceipt(){
  // mock: ถ้าเปิดในกรอบ preview/iframe → toast แทน (กัน print หน้าทั้งหมด) · standalone → window.print
  try{ if(window.top!==window.self){toast('ສົ່ງໄປເຄື່ອງພິມ / ແຊຣ໌ ແລ້ວ');return;} }catch(e){}
  try{ window.print(); }catch(e){ toast('ສົ່ງໄປເຄື່ອງພິມ / ແຊຣ໌ ແລ້ວ'); }
}

/* ============================================================
   N7 — แชท AI + ผู้ดูแล (mock)
   FAB → เลือก: ຜູ້ຊ່ວຍ AI (ถามงาน/วิธีใช้) / ຜູ້ດູແລ (หัวหน้า)
   → mock chat UI (bubble ตัวอย่าง + ช่องพิมพ์ + ปุ่มส่ง + mock reply)
   ============================================================ */
const CHAT={
  ai:{ name:'ຜູ້ຊ່ວຍ AI', ic:'bot', tone:'var(--primary-ink)', bg:'var(--primary-soft)',
    seed:[['them','ສະບາຍດີ! ຂ້ອຍຊ່ວຍເລື່ອງວິທີໃຊ້ແອັບ·ອໍເດີ·ຖັງຄືນ·ແຕ້ມໄດ້ ຖາມມາໄດ້ເລີຍ'],
          ['me','ລູກຄ້າບໍ່ຢູ່ ເຮັດແນວໃດ?'],
          ['them','ແຕະຈຸດນັ້ນ → ປຸ່ມ "ສົ່ງບໍ່ໄດ້" → ເລືອກເຫດຜົນ → ຖ່າຍຮູບໜ້າຮ້ານ · ລະບົບນັດສົ່ງໃໝ່ + ແຈ້ງຫົວໜ້າໃຫ້ອັດຕະໂນມັດ']],
    reply:'ຮັບຮູ້ແລ້ວ · ລອງເຮັດຕາມຂັ້ນຕອນນີ້ໄດ້ເລີຍ ຖ້າຍັງຕິດ ພິມ "ຜູ້ດູແລ" ເພື່ອຕໍ່ຫົວໜ້າ' },
  admin:{ name:'ຜູ້ດູແລ (ຫົວໜ້າສາຂາ)', ic:'shield', tone:'var(--green-ink)', bg:'var(--green-soft)',
    seed:[['them','<b>ສົມໃຈ (ຫົວໜ້າ)</b><br>ວ່າແນວໃດສົມພອນ · ມີຫຍັງໃຫ້ຊ່ວຍບໍ່'],
          ['me','ນ້ຳມັນລົດໃກ້ໝົດ ຂໍເຕີມກ່ອນໄດ້ບໍ່']],
    reply:'ໄດ້ເລີຍ ເຕີມຢູ່ປໍ້າໃນເສັ້ນທາງໄດ້ · ເກັບໃບຮັບເງິນຖ່າຍເຂົ້າລະບົບ "ເຕີມນ້ຳມັນ" ເດີ໋ຍວອະນຸມັດໃຫ້' }
};
function openChatPick(){
  modal(`<span style="display:inline-flex;align-items:center;gap:7px">${I.chat} ແຊທຊ່ວຍເຫຼືອ</span>`,
   `<div class="chat-pick">
      <div class="chat-opt" onclick="openChat('ai')">
        <div class="co-ic" style="background:${CHAT.ai.bg};color:${CHAT.ai.tone}">${I.bot}</div>
        <div><h3>${CHAT.ai.name}</h3><p>ຖາມຕອບວຽກ·ວິທີໃຊ້ແອັບ·24 ຊມ.</p></div>
      </div>
      <div class="chat-opt" onclick="openChat('admin')">
        <div class="co-ic" style="background:${CHAT.admin.bg};color:${CHAT.admin.tone}">${I.shield}</div>
        <div><h3>${CHAT.admin.name}</h3><p>ຕິດຕໍ່ຫົວໜ້າສາຂາໂດຍກົງ</p></div>
      </div>
    </div>`,
   `<button class="btn" onclick="closeM()">ປິດ</button>`);
}
function openChat(kind){
  const c=CHAT[kind];
  const bubbles=c.seed.map(b=>`<div class="bub ${b[0]}">${b[1]}</div>`).join('');
  modal(`<span style="display:inline-flex;align-items:center;gap:7px"><span style="display:inline-flex;width:18px;height:18px">${I[c.ic]}</span> ${c.name}</span>`,
   `<div class="chat-thread" id="chatThread">${bubbles}</div>
    <div class="chat-input">
      <input id="chatMsg" placeholder="ພິມຂໍ້ຄວາມ..." onkeydown="if(event.key==='Enter')sendChat('${kind}')">
      <button onclick="sendChat('${kind}')">${I.send2}</button>
    </div>`,
   `<button class="btn" onclick="openChatPick()">${I.back} ປ່ຽນຊ່ອງແຊທ</button>`);
  setTimeout(()=>{const t=$('chatThread');if(t)t.scrollTop=t.scrollHeight;},30);
}
function sendChat(kind){
  const inp=$('chatMsg');if(!inp)return;const v=(inp.value||'').trim();if(!v)return;
  const t=$('chatThread');
  t.insertAdjacentHTML('beforeend',`<div class="bub me">${v.replace(/</g,'&lt;')}</div>`);
  inp.value='';t.scrollTop=t.scrollHeight;
  // mock reply (พิมพ์ "ผู้ดูแล/admin" ระหว่างคุย AI → เด้งไป chat หัวหน้า)
  if(kind==='ai' && /ຜູ້ດູແລ|ດູແລ|admin|ຫົວໜ້າ/i.test(v)){
    setTimeout(()=>openChat('admin'),500);return;
  }
  setTimeout(()=>{
    t.insertAdjacentHTML('beforeend',`<div class="bub them">${CHAT[kind].reply}</div>`);
    t.scrollTop=t.scrollHeight;
  },600);
}

/* ============== SESSION (จำ login) ============== */
/* localStorage key loo_driver_session = {emp, ts} · อายุ ≤ 30 วัน → ข้าม login */
const SESSION_KEY='loo_driver_session';
const SESSION_TTL=30*24*60*60*1000; // 30 วัน
function saveSession(emp){
  try{localStorage.setItem(SESSION_KEY,JSON.stringify({emp:emp||'VARI-D012',ts:Date.now()}));}catch(e){}
}
function getSession(){
  try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
    if(s&&s.ts&&(Date.now()-s.ts)<SESSION_TTL)return s;}catch(e){}
  return null;
}
function clearSession(){try{localStorage.removeItem(SESSION_KEY);}catch(e){}}
function logout(){
  clearSession();
  toast('ອອກຈາກລະບົບ — ລົງເຂົ້າໃໝ່ໄດ້ເລີຍ');
  setTimeout(()=>go('login'),400);
}

/* ============== PWA: register service worker (guarded) ============== */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    try{
      navigator.serviceWorker.register('sw.js')
        .then(()=>console.log('SW registered (LOO Driver PWA)'))
        .catch(err=>console.log('SW register skipped:',err&&err.message));
    }catch(e){console.log('SW guard:',e&&e.message);}
  });
}

/* ============== INIT ============== */
function tick(){const d=new Date();$('clock').textContent=
  String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
tick();setInterval(tick,30000);
/* T5: seed ret:{barrel,crate} ลงทุก record (STOPS+INCOMING) จาก items (อ้าง field ret ของ VARI_CATALOG) · PET ไม่คืน · barrel ตรง bottle เดิม */
[...STOPS,...INCOMING].forEach(s=>{if(!s.ret)s.ret=seedRet(s.items);});
RUN.bottles=bottlesDone(); // F1: ตอนโหลด sync ถังรับคืน = sum จุด done ในรายการ (กัน seed ไม่ตรง)
$('runBadge').textContent=RUN.total-RUN.done;
updOff();
/* boot: มี session ที่ยังไม่หมดอายุ → ข้าม login ไปหน้า shift (เริ่มกะ) · ไม่งั้น → login */
(function boot(){
  const sess=getSession();
  if(sess){RUN._emp=sess.emp;go('shift');}
  else go('login');
})();
</script>
