<style>
:root{
  /* ---- LOO Blue Dark (ตรง Bible §1.1) ---- */
  --bg:#0F172A; --surface:#1E293B; --surface-2:#243449; --surface-3:#2D3F57;
  --side:#111C30; --line:#33425C; --line-2:#2A3850;
  --ink:#F1F5F9; --muted:#94A3B8; --muted-2:#64748B;
  --primary:#2563EB; --primary-soft:#1E3A6E; --primary-ink:#93B4FF;
  --green:#22C55E; --green-soft:#14331F; --green-ink:#5FE08A;
  --purple:#A855F7; --purple-soft:#34204A; --purple-ink:#CFA0FB;
  --blue:#38BDF8; --blue-soft:#0E3349; --blue-ink:#7DD3FC;
  --red:#EF4444; --red-soft:#3B1A1C; --red-ink:#FCA5A5;
  --amber:#F59E0B; --amber-soft:#3A2A0C; --amber-ink:#FCD34D;
  --radius:16px; --radius-sm:11px; --radius-xs:9px; --pill:20px;
  --shadow:0 1px 2px rgba(0,0,0,.35); --shadow-lg:0 24px 60px rgba(0,0,0,.55);
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Noto Sans Lao","Phetsarath OT","Segoe UI",system-ui,sans-serif;
  background:#0a0f1c; color:var(--ink); font-size:14px; line-height:1.55;
  display:flex; justify-content:center; align-items:flex-start;
  min-height:100vh; padding:0;
}
.mono,.num,.val,.money,.ref{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ---------- Phone frame (desktop preview) ---------- */
.device{
  position:relative; width:100%; max-width:430px; height:100vh;
  background:var(--bg); overflow:hidden;
  display:flex; flex-direction:column;
}
@media(min-width:480px){
  body{padding:22px 0;align-items:center}
  .device{min-height:auto;height:900px;max-height:94vh;border-radius:42px;
    border:11px solid #060a14;box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 2px #1e2940}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:150px;height:26px;background:#060a14;border-radius:0 0 18px 18px;z-index:200}
}
@media(max-width:479px){.notch{display:none}}

/* ---------- Status bar ---------- */
.statusbar{display:flex;justify-content:space-between;align-items:center;
  padding:11px 22px 3px;font-size:12px;color:var(--ink);font-family:var(--mono);
  flex:0 0 auto}
.statusbar .sb-r{display:flex;gap:5px;align-items:center}
.statusbar svg{width:14px;height:14px}

/* ---------- App header ---------- */
.appbar{flex:0 0 auto;padding:6px 16px 12px;border-bottom:1px solid var(--line-2);
  background:linear-gradient(180deg,var(--side),var(--bg))}
.brand{display:flex;align-items:center;gap:9px}
.logo{width:30px;height:30px;border-radius:9px;background:var(--primary);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;
  box-shadow:0 2px 10px rgba(37,99,235,.5)}
.brand .nm{font-weight:800;font-size:15px;letter-spacing:.3px}
.brand .sub{font-size:10.5px;color:var(--muted-2);font-weight:700;
  text-transform:uppercase;letter-spacing:.6px}
.appbar-right{margin-left:auto;display:flex;gap:7px;align-items:center}
.gpspill{display:flex;align-items:center;gap:6px;
  background:var(--green-soft);color:var(--green-ink);border:1px solid #1d5236;
  padding:5px 10px;border-radius:var(--pill);font-size:11px;font-weight:700}
.offpill{display:flex;align-items:center;gap:5px;background:var(--surface-3);color:var(--muted);
  border:1px solid var(--line);padding:5px 9px;border-radius:var(--pill);font-size:11px;font-weight:700;cursor:pointer}
.offpill svg{width:13px;height:13px}
.offpill.off{background:var(--amber-soft);color:var(--amber-ink);border-color:#5c4410}
.gpsdot{width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

/* ---------- Scroll body ---------- */
.scroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px 96px}
.scroll::-webkit-scrollbar{width:0}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:15px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--muted-2);margin:18px 4px 9px;display:flex;align-items:center;gap:6px}
.sec-label:first-child{margin-top:2px}
.sec-label svg{width:14px;height:14px;flex:none}
.ceic{width:20px;height:20px;flex:none;display:inline-grid;place-items:center}
.ceic svg{width:20px;height:20px}

/* ---------- Shift / run hero ---------- */
.hero{background:linear-gradient(135deg,#1b2a4d,#172138);
  border:1px solid var(--line);border-radius:var(--radius);padding:16px;
  display:flex;gap:14px;align-items:center}
.ring{position:relative;width:78px;height:78px;flex:0 0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.ring .rt b{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1}
.ring .rt span{font-size:9.5px;color:var(--muted);margin-top:2px}
.hero .hx{flex:1}
.hero .plate{display:inline-flex;align-items:center;gap:6px;background:#0c1424;
  border:1px solid var(--line);border-radius:8px;padding:3px 9px;
  font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.5px}
.hero .who{font-size:12px;color:var(--muted);margin-top:7px}
.hero .who b{color:var(--ink);font-weight:600}
.hbar{display:flex;gap:8px;margin-top:11px}
.hstat{flex:1;background:#0e1830;border:1px solid var(--line-2);border-radius:11px;
  padding:8px 10px}
.hstat .l{font-size:10px;color:var(--muted-2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.hstat .v{font-family:var(--mono);font-weight:700;font-size:15px;margin-top:2px}
.hstat .v small{font-size:10px;color:var(--muted);font-weight:400}

/* ---------- Segmented ---------- */
.seg{display:flex;background:var(--surface-3);border-radius:12px;padding:3px;gap:2px;margin:14px 0 4px}
.seg button{flex:1;border:0;background:transparent;color:var(--muted);
  font-family:inherit;font-weight:700;font-size:12.5px;padding:8px 4px;
  border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.seg button .cnt{font-family:var(--mono);font-size:11px;background:#0c1424;
  padding:1px 6px;border-radius:8px;color:var(--muted)}
/* F2: แถบสีตามสถานะ — เห็นชัดทั้งหมด/รอส่ง/สำเร็จ/ไม่สำเร็จ (count badge มีสีเสมอ แม้ไม่ active) */
.seg button[data-st="all"] .cnt{background:var(--primary-soft);color:var(--primary-ink)}
.seg button[data-st="pending"] .cnt{background:var(--amber-soft);color:var(--amber-ink)}
.seg button[data-st="done"] .cnt{background:var(--green-soft);color:var(--green-ink)}
.seg button[data-st="failed"] .cnt{background:var(--red-soft);color:var(--red-ink)}
.seg button.on{color:#fff}
.seg button.on .cnt{background:rgba(255,255,255,.22);color:#fff}
.seg button[data-st="all"].on{background:var(--primary)}
.seg button[data-st="pending"].on{background:var(--amber);color:#1a1205}
.seg button[data-st="done"].on{background:var(--green);color:#06210f}
.seg button[data-st="failed"].on{background:var(--red)}
.seg button[data-st="pending"].on .cnt{background:rgba(0,0,0,.18);color:#1a1205}
.seg button[data-st="done"].on .cnt{background:rgba(0,0,0,.18);color:#06210f}

/* ---------- Stop card ---------- */
.stop{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:13px 13px 13px 13px;margin-bottom:10px;position:relative;cursor:pointer;
  display:flex;gap:12px;transition:border-color .15s,transform .05s}
.stop:active{transform:scale(.992)}
.stop.now{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.stop.done{opacity:.62}
.stop.failed{border-color:#5c2528;background:linear-gradient(0deg,var(--red-soft),var(--surface) 60%)}
.stop.failed .stnum{background:var(--red-soft);color:var(--red-ink);border-color:#5c2528}
.stnum{flex:0 0 auto;width:34px;height:34px;border-radius:10px;display:grid;
  place-items:center;font-family:var(--mono);font-weight:700;font-size:14px;
  background:var(--surface-3);color:var(--muted);border:1px solid var(--line)}
.stop.now .stnum{background:var(--amber-soft);color:var(--amber-ink);border-color:#5c4410}
.stop.done .stnum{background:var(--green-soft);color:var(--green-ink);border-color:#1d5236}
.stbody{flex:1;min-width:0}
.stbody .nm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px}
.stbody .addr{font-size:12px;color:var(--muted);margin-top:2px;
  display:flex;align-items:center;gap:5px}
.stbody .addr svg{width:13px;height:13px;flex:0 0 auto;color:var(--muted-2)}
.stmeta{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.stright{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.stright .amt{font-family:var(--mono);font-weight:700;font-size:14px}
.dist{font-size:11px;color:var(--muted-2);font-family:var(--mono);
  display:flex;align-items:center;gap:3px}

/* ---------- Chips ---------- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:var(--pill);border:1px solid transparent}
.chip svg{width:12px;height:12px}
.c-cash{background:var(--green-soft);color:var(--green-ink);border-color:#1d5236}
.c-qr{background:var(--purple-soft);color:var(--purple-ink);border-color:#3f2a5c}
.c-transfer{background:var(--blue-soft);color:var(--blue-ink);border-color:#11425e}
.c-credit{background:var(--red-soft);color:var(--red-ink);border-color:#5c2528}
.c-neutral{background:var(--surface-3);color:var(--muted);border-color:var(--line)}
.c-ok{background:var(--green-soft);color:var(--green-ink);border-color:#1d5236}
.c-warn{background:var(--amber-soft);color:var(--amber-ink);border-color:#5c4410}
.tag-bottle{background:var(--blue-soft);color:var(--blue-ink);border:1px solid #11425e;
  font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;
  display:inline-flex;align-items:center;gap:4px}
.tag-bottle svg{width:12px;height:12px}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:1px solid var(--line);background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:700;font-size:14px;padding:13px 16px;
  border-radius:13px;cursor:pointer;width:100%;transition:.12s}
.btn svg{width:18px;height:18px}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;
  box-shadow:0 4px 16px rgba(37,99,235,.4)}
.btn.green{background:var(--green);border-color:var(--green);color:#06230f;
  box-shadow:0 4px 16px rgba(34,197,94,.35)}
.btn.ghost-red{background:var(--red-soft);border-color:#5c2528;color:var(--red-ink)}
.btn.lg{font-size:16px;padding:16px}
.btn-row{display:flex;gap:9px}
.btn-row .btn{flex:1}

/* ---------- Detail (stop) ---------- */
.det-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:4px}
.det-head .stnum{width:40px;height:40px;font-size:16px}
.det-head h2{margin:0;font-size:18px;font-weight:700}
.det-head .addr{font-size:12.5px;color:var(--muted);margin-top:3px;
  display:flex;gap:5px;align-items:flex-start}
.det-head .addr svg{width:14px;height:14px;margin-top:2px;flex:0 0 auto;color:var(--muted-2)}
.kv{display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.kv:last-child{border-bottom:0}
.kv span{color:var(--muted)}
.kv b{font-weight:600}
.kv b.mono{font-family:var(--mono)}
.itemline{display:flex;justify-content:space-between;padding:8px 0;
  border-bottom:1px dashed var(--line-2);font-size:13px}
.itemline:last-child{border-bottom:0}
.itemline .q{font-family:var(--mono);color:var(--muted)}
.amt-due{display:flex;justify-content:space-between;align-items:center;
  margin-top:6px;padding-top:11px;border-top:1px solid var(--line)}
.amt-due .l{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.amt-due .v{font-family:var(--mono);font-weight:700;font-size:22px}

/* ---------- T4: รายการสินค้าปรับได้ (stepper) + ส่วนลด/โปรโม ---------- */
.itrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line-2)}
.itrow:last-of-type{border-bottom:0}
.itrow .it-nm{flex:1;min-width:0}
.itrow .it-nm b{font-size:13.5px;font-weight:600;display:block;line-height:1.3}
.itrow .it-nm .it-pr{font-family:var(--mono);font-size:11px;color:var(--muted)}
.itstep{display:flex;align-items:center;gap:6px;flex:none}
.itstep button{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--line-2);
  background:var(--surface-2);color:var(--ink);font-size:19px;line-height:1;cursor:pointer;flex:none;display:grid;place-items:center}
.itstep button:active{background:var(--surface-3)}
.itstep button svg{width:14px;height:14px}
.itstep .iq{width:26px;text-align:center;font-family:var(--mono);font-weight:700;font-size:15px}
.itrow .it-amt{width:78px;text-align:right;font-family:var(--mono);font-weight:700;font-size:13px;flex:none}
.it-add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;
  border:1.5px dashed var(--primary);background:var(--primary-soft);color:var(--primary-ink);
  font-family:inherit;font-weight:700;font-size:13.5px;padding:11px;border-radius:var(--radius-sm);cursor:pointer}
.it-add svg{width:16px;height:16px}
.it-add:active{transform:scale(.99)}
/* promo input + chip */
.promo-row{display:flex;gap:8px;margin-top:6px}
.promo-row input{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:11px 13px;color:var(--ink);font-family:var(--mono);font-size:14px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;outline:none}
.promo-row input:focus{border-color:var(--primary)}
.promo-row .promo-go{flex:none;width:64px;border:1px solid var(--primary);background:var(--primary);color:#fff;
  font-family:inherit;font-weight:700;font-size:13.5px;border-radius:var(--radius-sm);cursor:pointer}
.promo-row .promo-go:active{transform:scale(.97)}
.promo-chip{display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:var(--green-soft);
  color:var(--green-ink);border:1px solid #1d5236;border-radius:var(--pill);padding:5px 10px 5px 11px;
  font-size:12px;font-weight:700}
.promo-chip svg{width:13px;height:13px}
.promo-chip .px{margin-left:2px;width:18px;height:18px;border-radius:50%;border:0;background:rgba(0,0,0,.25);
  color:var(--green-ink);font-size:12px;cursor:pointer;display:grid;place-items:center;line-height:1}
/* ค่ามัดจำภาชนะ — toggle card (checkbox) */
.dep-card{display:flex;align-items:center;gap:11px;margin-top:10px;padding:11px 13px;cursor:pointer;
  border:1.5px solid var(--line);background:var(--surface-2);border-radius:var(--radius-sm);transition:.12s}
.dep-card:active{transform:scale(.995)}
.dep-card.on{border-color:var(--blue);background:var(--blue-soft)}
.dep-card .dep-box{width:24px;height:24px;flex:none;border-radius:7px;border:1.5px solid var(--line);
  background:var(--surface);display:grid;place-items:center;color:var(--blue-ink)}
.dep-card .dep-box svg{width:15px;height:15px}
.dep-card.on .dep-box{border-color:var(--blue);background:var(--blue-soft)}
/* แถวสรุป: ยอดเดิม / ส่วนลด / สุทธิ */
.sumline{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.sumline svg{width:14px;height:14px;vertical-align:-2px} /* กันไอคอน I.bottle ในบรรทัดมัดจำขยายเต็มแถว */
.sumline.disc{color:var(--green-ink)}
.sumline .sv{font-family:var(--mono);font-weight:700}

/* ---------- Payment picker ---------- */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.pay-opt{border:1.5px solid var(--line);background:var(--surface-2);border-radius:12px;
  padding:12px 10px;cursor:pointer;display:flex;align-items:center;gap:9px;
  font-weight:700;font-size:13.5px;transition:.12s}
.pay-opt svg{width:20px;height:20px}
.pay-opt .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.pay-opt.sel{border-color:var(--primary);background:var(--primary-soft)}
.pay-opt.sel.cash{border-color:var(--green);background:var(--green-soft)}
.pay-opt.sel.qr{border-color:var(--purple);background:var(--purple-soft)}
.pay-opt.sel.transfer{border-color:var(--blue);background:var(--blue-soft)}
.pay-opt.sel.credit{border-color:var(--red);background:var(--red-soft)}

/* ---------- Bottle stepper ---------- */
.stepper{display:flex;align-items:center;gap:0;border:1px solid var(--line);
  border-radius:12px;overflow:hidden;background:var(--surface-2)}
.stepper button{border:0;background:transparent;color:var(--ink);width:48px;height:46px;
  font-size:24px;cursor:pointer;display:grid;place-items:center}
.stepper button:active{background:var(--surface-3)}
.stepper .val{flex:1;text-align:center;font-family:var(--mono);font-weight:700;font-size:20px}

/* ---------- Photo capture ---------- */
.photo-tile{border:1.5px dashed var(--line);border-radius:13px;background:var(--surface-2);
  height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;color:var(--muted);transition:.15s;position:relative;overflow:hidden}
.photo-tile svg{width:30px;height:30px}
.photo-tile.has{border-style:solid;border-color:var(--green);color:var(--green-ink)}
.photo-tile .fake-img{position:absolute;inset:0;
  background:linear-gradient(135deg,#1d2b3f,#2a3d57);display:none;
  align-items:flex-end;padding:9px}
.photo-tile.has .fake-img{display:flex}
.photo-tile.has .ph-text{display:none}
.geo-stamp{font-family:var(--mono);font-size:10px;background:rgba(0,0,0,.55);
  color:#cfe;padding:3px 7px;border-radius:6px;line-height:1.3}

/* ---------- POD success ---------- */
.pod-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:26px 16px}
.pod-check{width:96px;height:96px;border-radius:50%;background:var(--green-soft);
  border:2px solid var(--green);display:grid;place-items:center;margin-bottom:18px;
  animation:pop .4s cubic-bezier(.2,1.3,.4,1)}
.pod-check svg{width:48px;height:48px;color:var(--green)}
@keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
.pod-wrap h2{margin:0 0 6px;font-size:21px}
.pod-wrap .pod-sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.pod-recap{width:100%;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:6px 15px;margin-bottom:18px;text-align:left}

/* ---------- Map (stylized) ---------- */
.mapbox{position:relative;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--line);height:300px;background:#0c1626}
.mapbox>svg,.mapbox>#dmap{position:absolute;inset:0;width:100%;height:100%}
.leaflet-container{background:#0c1626;font-family:inherit}
.maptip{background:var(--surface)!important;border:1px solid var(--line)!important;color:var(--ink)!important;border-radius:8px;font-size:12px;box-shadow:var(--shadow)}
.maptip:before{display:none}
.mapcard{position:absolute;left:12px;right:12px;bottom:12px;z-index:1000;background:var(--surface);
  border:1px solid var(--line);border-radius:13px;padding:12px;box-shadow:var(--shadow-lg)}

/* ---------- Money/summary ---------- */
.report-sheet{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:16px}
.report-line{display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.report-line .lab{display:flex;align-items:center;gap:9px;color:var(--muted)}
.report-line .lab .ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto}
.report-line .vv{font-family:var(--mono);font-weight:700}
.report-line.total{border-top:1.5px solid var(--line);border-bottom:0;margin-top:5px;padding-top:13px;font-size:16px}
.report-line.total .vv{font-size:18px}

/* ---------- Leaderboard ---------- */
.lrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2)}
.lrow:last-child{border-bottom:0}
.rank{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  font-family:var(--mono);font-weight:700;font-size:14px;background:var(--surface-3);color:var(--muted)}
.rank.r1{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#3a2a0c}
.rank.r2{background:linear-gradient(135deg,#e2e8f0,#94a3b8);color:#1e293b}
.rank.r3{background:linear-gradient(135deg,#fdba74,#c2724e);color:#3a1e0c}
.lrow.me{background:var(--primary-soft);margin:0 -8px;padding:11px 8px;border-radius:10px;border-bottom:0}

/* ---------- Bottom nav ---------- */
.tabbar{flex:0 0 auto;position:absolute;bottom:0;left:0;right:0;
  display:flex;background:var(--side);border-top:1px solid var(--line);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50}
.tabbar button{flex:1;border:0;background:transparent;color:var(--muted-2);
  font-family:inherit;font-size:10.5px;font-weight:700;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px}
.tabbar button svg{width:22px;height:22px}
.tabbar button.on{color:var(--primary-ink)}
.tabbar .badge{position:absolute;top:2px;margin-left:18px;background:var(--red);color:#fff;
  font-family:var(--mono);font-size:9px;font-weight:700;min-width:16px;height:16px;
  border-radius:8px;display:grid;place-items:center;padding:0 4px}

/* ---------- page head ---------- */
.phead{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.phead .back{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);
  background:var(--surface);display:grid;place-items:center;cursor:pointer;flex:0 0 auto}
.phead .back svg{width:18px;height:18px}
.phead h1{margin:0;font-size:18px;font-weight:700}
.phead .pdesc{font-size:11.5px;color:var(--muted)}

/* ---------- toast ---------- */
.toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
  background:#0c1424;border:1px solid var(--line);color:var(--ink);
  padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:120;
  display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast svg{width:17px;height:17px;color:var(--green)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Login + Shift ---------- */
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 20px 0;text-align:center}
.login-logo{width:62px;height:62px;border-radius:18px;background:var(--primary);display:grid;
  place-items:center;color:#fff;font-weight:800;font-size:30px;box-shadow:0 8px 28px rgba(37,99,235,.5);margin-top:18px}
.login-h{margin:15px 0 2px;font-size:22px;font-weight:800}
.login-sub{color:var(--muted);font-size:12.5px;margin-bottom:22px}
.field{width:100%;text-align:left;margin-bottom:18px}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted-2);display:block;margin-bottom:6px}
.field input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;color:var(--ink);font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:1px;outline:none}
.field input:focus{border-color:var(--primary)}
.pin-label{font-size:12.5px;color:var(--muted);margin-bottom:13px}
.pin-dots{display:flex;gap:16px;margin-bottom:22px}
.pin-dots .pd{width:15px;height:15px;border-radius:50%;border:2px solid var(--line);transition:.15s}
.pin-dots .pd.on{background:var(--primary);border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;width:100%;max-width:290px}
.keypad button{height:58px;border:1px solid var(--line);background:var(--surface);border-radius:15px;
  color:var(--ink);font-family:var(--mono);font-size:23px;font-weight:600;cursor:pointer}
.keypad button:active{background:var(--surface-2)}
.keypad .kp-ghost{border:0;background:transparent;font-size:21px;color:var(--muted)}
.shift-wrap{display:flex;flex-direction:column;align-items:center;padding:38px 20px 0;text-align:center}
.shift-hello{color:var(--muted);font-size:15px}
.shift-name{margin:4px 0 22px;font-size:25px;font-weight:800}
.shift-card{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.shift-truck{display:flex;gap:13px;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--line-2)}
.shift-truck .tic{width:46px;height:46px;border-radius:13px;background:var(--primary-soft);color:var(--primary-ink);display:grid;place-items:center}
.shift-truck .tic svg{width:24px;height:24px}
.plate2{font-family:var(--mono);font-weight:700;font-size:18px;text-align:left}
.who2{color:var(--muted);font-size:12.5px;text-align:left}
.shift-grid{display:flex;gap:10px;margin-top:14px}
.shift-grid .sg{flex:1;text-align:left}
.shift-grid .l{font-size:10.5px;color:var(--muted-2);font-weight:700;text-transform:uppercase}
.shift-grid .v{font-family:var(--mono);font-weight:700;font-size:18px;margin-top:3px}
.shift-grid .v small{font-size:11px;color:var(--muted);font-weight:400;font-family:inherit}

/* ---------- Modal (bottom-sheet) ---------- */
.modal-mask{position:absolute;inset:0;background:rgba(5,9,18,.72);z-index:80;display:none;
  align-items:flex-end;justify-content:center}
.modal-mask.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:20px 20px 0 0;
  width:100%;max-height:90%;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);
  animation:slideup .26s cubic-bezier(.2,.9,.3,1)}
@keyframes slideup{from{transform:translateY(60px)}to{transform:translateY(0)}}
.modal .mh{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--line-2)}
.modal .mh b{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.modal .mh b svg{width:18px;height:18px;color:var(--primary-ink)}
.modal .mx{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);
  color:var(--muted);font-size:13px;cursor:pointer}
.modal .mb{padding:16px;overflow-y:auto}
.modal .mf{padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line-2);display:flex;gap:9px}
.modal .mf .btn{flex:1}
.field select,.field textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;color:var(--ink);font-family:inherit;font-size:14px;outline:none}
.field select:focus,.field textarea:focus{border-color:var(--primary)}
.frow{display:flex;gap:10px}.frow .field{flex:1}
.hint{font-size:11.5px;color:var(--muted);margin-top:-4px;margin-bottom:14px;display:flex;gap:6px;align-items:flex-start}
.hint svg{width:14px;height:14px;flex:none;margin-top:1px;color:var(--amber-ink)}

/* ---------- Checklist (vehicle inspect) ---------- */
.chk{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line-2);cursor:pointer}
.chk:last-child{border-bottom:0}
.chk .box{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:none;
  display:grid;place-items:center;color:transparent;transition:.12s}
.chk .box svg{width:15px;height:15px}
.chk.on .box{background:var(--green);border-color:var(--green);color:#06230f}
.chk .lab{font-size:14px;flex:1}
/* per-item note + photo (ตรวจรถ) */
.chk-row{border-bottom:1px solid var(--line-2)}
.chk-row:last-child{border-bottom:0}
.chk-row .chk{border-bottom:0}
.chk-note{margin-left:auto;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
  background:var(--surface-2);color:var(--muted);display:grid;place-items:center;cursor:pointer;flex:none}
.chk-note svg{width:16px;height:16px}
.chk-note.has{border-color:var(--amber);color:var(--amber-ink);background:var(--amber-soft)}
.chk-detail{padding:2px 2px 12px;display:flex;flex-direction:column;gap:8px}
.chk-detail textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;color:var(--ink);font-family:inherit;font-size:13px;outline:none;resize:none}
.photo-tile.mini{height:88px;border-radius:11px}
.photo-tile.mini svg{width:22px;height:22px}
/* scan button (ใบเสร็จ / บัตรพนักงาน) */
.scan-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:1.5px dashed var(--primary);
  background:var(--primary-soft);color:var(--primary-ink);font-family:inherit;font-weight:700;font-size:14px;
  padding:13px;border-radius:13px;cursor:pointer;margin-bottom:14px}
.scan-btn svg{width:20px;height:20px}
.scan-btn:active{transform:scale(.99)}
/* crew rows (สแกนคนขึ้นรถ) */
.crew-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2)}
.crew-row:last-child{border-bottom:0}
.cr-ic{width:40px;height:40px;border-radius:11px;background:var(--surface-3);color:var(--muted);
  display:grid;place-items:center;flex:none}
.cr-ic svg{width:20px;height:20px}
.crew-tog{border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-family:inherit;
  font-weight:700;font-size:12px;padding:8px 14px;border-radius:var(--pill);cursor:pointer;flex:none}
.crew-tog.on{background:var(--green-soft);color:var(--green-ink);border-color:#1d5236}

/* ---------- Pre-trip hub (shift) ---------- */
.pretrip{width:100%;display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.pt-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:13px;padding:13px;cursor:pointer;text-align:left;transition:.12s}
.pt-item:active{transform:scale(.99)}
.pt-item.done{border-color:#1d5236}
.pt-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;
  background:var(--surface-3);color:var(--muted)}
.pt-ic svg{width:20px;height:20px}
.pt-item.done .pt-ic{background:var(--green-soft);color:var(--green-ink)}
.pt-tx{flex:1}.pt-tx b{font-size:14px;font-weight:600;display:block}.pt-tx span{font-size:11.5px;color:var(--muted)}
.pt-go{color:var(--muted-2);font-family:var(--mono);font-size:12px}
.pt-item.done .pt-go{color:var(--green-ink)}

/* ---------- Quickbar (run) ---------- */
.quickbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.qbtn{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:10px 4px;
  display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-size:11px;font-weight:700;color:var(--muted)}
.qbtn svg{width:20px;height:20px}
.qbtn:active{transform:scale(.97)}
.qbtn.sos{background:var(--red-soft);border-color:#5c2528;color:var(--red-ink)}

/* ---------- gamification strip ---------- */
.gami{display:flex;align-items:center;flex-wrap:nowrap;gap:9px;overflow:hidden;background:#0e1830;border:1px solid var(--line-2);
  border-radius:12px;padding:9px 12px;margin-top:11px}
.gami .lv,.gami .pts{flex:none}
.gami .lv{display:flex;align-items:center;gap:6px;color:var(--amber-ink);font-weight:700;font-size:12.5px}
.gami .lv svg{width:15px;height:15px}
.gami .pts{font-family:var(--mono);font-weight:700;font-size:13px}
.gami .rank{margin-left:auto;font-size:10.5px;color:var(--muted);font-weight:700;white-space:nowrap;
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;text-align:right}
.gami .rank b{color:var(--ink);font-family:var(--mono)}

.hide{display:none!important}
.demo-tag{font-size:10px;color:var(--amber-ink);background:var(--amber-soft);
  border:1px solid #5c4410;border-radius:7px;padding:3px 8px;font-weight:700;
  display:inline-block;margin-bottom:10px}

/* ============================================================
   งานแทรก / ออเดอร์ใหม่ระหว่างวิ่ง (incoming job)
   banner = position:absolute ใน .device (ไม่ fixed · กัน iframe พัง)
   ============================================================ */
.demo-trig{display:inline-flex;align-items:center;gap:6px;font-family:inherit;
  font-size:11px;font-weight:700;color:var(--amber-ink);background:transparent;
  border:1px dashed #5c4410;border-radius:8px;padding:6px 11px;cursor:pointer;
  margin:0 0 12px 8px;vertical-align:top}
.demo-trig svg{width:14px;height:14px}
.demo-trig:active{transform:scale(.97)}
.jobbanner{position:absolute;top:0;left:0;right:0;z-index:140;padding:8px 12px;
  transform:translateY(-130%);transition:transform .34s cubic-bezier(.2,.9,.3,1);
  pointer-events:none}
.jobbanner.show{transform:translateY(0);pointer-events:auto}
.jb-card{background:var(--surface);border:1.5px solid var(--green);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;
  animation:jbglow 1.6s ease-in-out infinite}
@keyframes jbglow{0%,100%{box-shadow:0 14px 40px rgba(0,0,0,.5),0 0 0 0 rgba(34,197,94,.34)}
  55%{box-shadow:0 14px 40px rgba(0,0,0,.5),0 0 0 5px rgba(34,197,94,0)}}
.jb-top{display:flex;align-items:center;gap:9px;padding:11px 13px 9px}
.jb-ic{width:34px;height:34px;flex:0 0 auto;border-radius:10px;display:grid;place-items:center;
  background:var(--green-soft);color:var(--green-ink)}
.jb-ic svg{width:19px;height:19px}
.jb-tx{flex:1;min-width:0}
.jb-tx .jb-h{font-size:12px;font-weight:800;color:var(--green-ink);
  display:flex;align-items:center;gap:5px}
.jb-tx .jb-h svg{width:13px;height:13px;flex:0 0 auto}
.jb-tx .jb-nm{font-size:14px;font-weight:700;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jb-meta{display:flex;align-items:center;gap:7px;padding:0 13px 10px;flex-wrap:wrap}
.jb-meta .chip{font-size:11px}
.jb-act{display:flex;gap:8px;padding:0 11px 11px}
.jb-act button{flex:1;border:0;font-family:inherit;font-weight:800;font-size:13.5px;
  padding:11px;border-radius:11px;cursor:pointer;display:inline-flex;
  align-items:center;justify-content:center;gap:6px}
.jb-act button svg{width:16px;height:16px}
.jb-act .jb-ok{background:var(--green);color:#06230f;box-shadow:0 4px 14px rgba(34,197,94,.4)}
.jb-act .jb-later{flex:0 0 auto;background:var(--surface-3);color:var(--muted);
  border:1px solid var(--line)!important;padding:11px 14px}
.jb-act button:active{transform:scale(.97)}

/* ---------- Customer detail: satisfaction (SVG face · mono · NO emoji) ---------- */
.satrow{display:flex;gap:9px;align-items:stretch}
.satface{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:11px 6px 9px;opacity:.4;transition:.18s}
.satface.on{opacity:1;border-width:1.5px;background:var(--surface-3)}
.satface .ring{width:40px;height:40px;border-radius:50%;display:grid;place-items:center}
.satface .ring svg{width:30px;height:30px;stroke:currentColor;fill:none;
  stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.satface .sl{font-size:11px;font-weight:700}
/* mini real map (Leaflet) inside customer modal */
.custmap{position:relative;height:160px;border-radius:var(--radius-sm);overflow:hidden;
  border:1px solid var(--line);background:var(--surface-2)}
.custmap #custdmap{position:absolute;inset:0;width:100%;height:100%}

/* ============================================================
   โหมดขับรถ (driving mode) — full-screen minimal · ปุ่มใหญ่ · ตาถนน
   position:absolute ใน .device (เหมือน .modal-mask) → ไม่ใช้ fixed · ไม่พัง iframe
   ============================================================ */
.drive{position:absolute;inset:0;z-index:300;background:var(--bg);
  display:none;flex-direction:column;padding:0}
.drive.show{display:flex}
.drive-top{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 18px 10px}
.drive-prog{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--muted)}
.drive-prog svg{width:16px;height:16px;color:var(--green-ink)}
.drive-prog b{font-family:var(--mono);color:var(--ink);font-size:15px}
.drive-acts{display:flex;gap:9px}
.drive-ic{width:46px;height:46px;border-radius:13px;border:1px solid var(--line);
  background:var(--surface-2);color:var(--ink);display:grid;place-items:center;cursor:pointer}
.drive-ic svg{width:24px;height:24px}
.drive-ic.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary-ink)}
.drive-ic:active{transform:scale(.96)}
.drive-mid{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;
  padding:8px 22px;min-height:0;overflow:hidden}
.drive-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--muted-2);display:flex;align-items:center;gap:7px}
.drive-label svg{width:17px;height:17px;color:var(--amber-ink)}
.drive-name{font-size:40px;font-weight:800;line-height:1.12;margin:10px 0 6px;
  letter-spacing:-.5px;word-break:break-word}
.drive-dist{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.drive-dist .km{font-family:var(--mono);font-size:30px;font-weight:800;color:var(--primary-ink)}
.drive-dist .un{font-size:16px;color:var(--muted);font-weight:700}
.drive-addr{font-size:16px;color:var(--muted);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.drive-addr svg{width:20px;height:20px;flex:0 0 auto;margin-top:3px;color:var(--muted-2)}
.drive-empty{text-align:center;color:var(--muted);font-size:17px;line-height:1.7}
.drive-empty .big{font-size:46px;font-weight:800;color:var(--green-ink);margin-bottom:8px}
.drive-bot{flex:0 0 auto;display:flex;flex-direction:column;gap:11px;
  padding:12px 18px calc(20px + env(safe-area-inset-bottom))}
.drive-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;
  border:0;font-family:inherit;font-weight:800;font-size:22px;padding:22px 16px;
  border-radius:18px;cursor:pointer;transition:.1s}
.drive-btn svg{width:28px;height:28px}
.drive-btn:active{transform:scale(.985)}
.drive-btn.nav{background:var(--surface-2);color:var(--ink);border:1px solid var(--line)}
.drive-btn.arrive{background:var(--green);color:#06230f;box-shadow:0 6px 22px rgba(34,197,94,.4)}

/* ============================================================
   Tour สอนครั้งแรก (onboarding) — overlay มืด + การ์ดกลางจอ
   ============================================================ */
/* N3: spotlight tour — เจาะรูที่ element เป้าหมายจริง (เหมือน intro.js/shepherd) */
.tour{position:absolute;inset:0;z-index:320;display:none;pointer-events:none}
.tour.show{display:block}
/* รูเจาะ = div วางทับ element จริง + box-shadow ใหญ่รอบ → รอบมืดหมด เหลือสว่างตรง element */
.tour-cut{position:absolute;border-radius:12px;pointer-events:none;
  box-shadow:0 0 0 9999px rgba(5,9,18,.82);
  outline:2px solid var(--primary-ink);outline-offset:3px;
  transition:top .28s cubic-bezier(.2,.9,.3,1),left .28s cubic-bezier(.2,.9,.3,1),width .28s,height .28s}
/* การ์ด tooltip เล็ก ชี้ติด element (วางใต้/บน ตามพื้นที่) */
.tour-tip{position:absolute;width:calc(100% - 36px);max-width:330px;
  background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:16px 16px 14px;box-shadow:var(--shadow-lg);pointer-events:auto;
  animation:slideup .24s cubic-bezier(.2,.9,.3,1)}
.tour-tip .tt-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tour-tip .tt-ic{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
  background:var(--primary-soft);color:var(--primary-ink)}
.tour-tip .tt-ic svg{width:21px;height:21px}
.tour-tip .tt-step{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted-2)}
.tour-tip h2{margin:1px 0 0;font-size:16px;font-weight:800}
.tour-tip p{margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.6}
.tour-dots{display:flex;gap:7px;margin:0 0 12px}
.tour-dots .td{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.18s}
.tour-dots .td.on{background:var(--primary-ink);width:20px;border-radius:5px}
.tour-foot{display:flex;align-items:center;gap:10px}
.tour-next{flex:1;border:0;background:var(--primary);color:#fff;font-family:inherit;
  font-weight:800;font-size:14px;padding:12px;border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 16px rgba(37,99,235,.4)}
.tour-next svg{width:17px;height:17px}
.tour-next:active{transform:scale(.97)}
.tour-skip{border:0;background:transparent;color:var(--muted-2);font-family:inherit;
  font-weight:700;font-size:12.5px;cursor:pointer;padding:8px 4px;white-space:nowrap}
/* ลูกศรชี้ของ tooltip */
.tour-tip::before{content:"";position:absolute;width:13px;height:13px;background:var(--surface);
  border:1px solid var(--line);transform:rotate(45deg)}
.tour-tip.below::before{top:-7px;left:var(--arrow,30px);border-right:0;border-bottom:0}
.tour-tip.above::before{bottom:-7px;left:var(--arrow,30px);border-left:0;border-top:0}

/* ---------- N6: ใบเสร็จ / สลิป (กระดาษ mock · เลข=mono · ลาว=Noto Sans Lao) ---------- */
.receipt{background:#fff;color:#15233b;border-radius:10px;padding:16px 15px;
  font-family:"Noto Sans Lao",sans-serif;font-size:12px;line-height:1.65;
  box-shadow:0 1px 0 #d7dde6, 0 8px 24px rgba(0,0,0,.25)}
.receipt .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
/* หัวใบเสร็จ: โลโก้ + ข้อมูลบริษัท */
.receipt .rc-top{text-align:center;border-bottom:1px dashed #b9c2d0;padding-bottom:11px;margin-bottom:10px}
.receipt .rc-logo{height:54px;width:auto;display:block;margin:0 auto 9px}
.receipt .rc-brand{font-weight:800;font-size:15.5px;letter-spacing:.2px;color:#0f1d33}
.receipt .rc-legal{font-size:11px;color:#33455f;margin-top:1px}
.receipt .rc-org{font-size:9.8px;color:#5b6b82;line-height:1.5;margin-top:3px}
.receipt .rc-title{text-align:center;font-weight:800;font-size:12.5px;letter-spacing:.4px;
  color:#15233b;margin:2px 0 9px;text-transform:uppercase}
/* meta (เลขที่บิล/วันเวลา/ลูกค้า/คนขับ) */
.receipt .rc-meta{margin-bottom:9px}
.receipt .rc-row{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.receipt .rc-row+.rc-row{margin-top:2px}
.receipt .rc-row .mut{color:#5b6b82;font-size:11px;flex:none}
.receipt .rc-row .rv{text-align:right}
/* ตารางรายการ */
.receipt .rc-items{border-top:1px dashed #b9c2d0;border-bottom:1px dashed #b9c2d0;
  margin:9px 0;padding:7px 0}
.receipt .rc-ihead{display:grid;grid-template-columns:1fr 56px 26px 72px;gap:4px;
  font-size:9.5px;color:#8290a3;font-weight:700;padding-bottom:5px;
  border-bottom:1px solid #eef1f6;margin-bottom:5px;text-transform:uppercase;letter-spacing:.2px}
.receipt .rc-ihead .r{text-align:right}.receipt .rc-ihead .c{text-align:center}
.receipt .rc-iline{display:grid;grid-template-columns:1fr 56px 26px 72px;gap:4px;
  font-size:11px;align-items:baseline;padding:2px 0}
.receipt .rc-iline .nm{color:#15233b}
.receipt .rc-iline .up,.receipt .rc-iline .lt{text-align:right;color:#33455f}
.receipt .rc-iline .qt{text-align:center;color:#33455f}
.receipt .rc-iline .lt{font-weight:700;color:#0f1d33}
/* สรุปยอด */
.receipt .rc-sum{margin:8px 0 2px}
.receipt .rc-sline{display:flex;justify-content:space-between;font-size:11.5px;padding:1.5px 0;color:#33455f}
.receipt .rc-sline.disc{color:#0a7a43}
.receipt .rc-tot{display:flex;justify-content:space-between;font-weight:800;font-size:14.5px;
  margin-top:6px;padding-top:6px;border-top:2px solid #15233b;color:#0f1d33}
.receipt .rc-pay{display:flex;justify-content:space-between;font-size:11px;color:#5b6b82;margin-top:5px}
/* QR */
.receipt .rc-qr{margin:11px auto 2px;width:96px;height:96px;border-radius:8px;
  display:grid;place-items:center;background:#fff;border:1px solid #dfe5ee;padding:4px}
.receipt .rc-qr img,.receipt .rc-qr canvas{width:88px !important;height:88px !important;display:block;border-radius:3px}
.receipt .rc-qr svg{width:84px;height:84px;color:#15233b}
.receipt .rc-qrcap{text-align:center;font-size:9px;color:#8290a3;margin-top:4px;font-family:var(--mono)}
.receipt .rc-foot{text-align:center;font-size:10px;color:#5b6b82;
  border-top:1px dashed #b9c2d0;padding-top:9px;margin-top:9px}
@media print{body *{visibility:hidden}#rcPrint,#rcPrint *{visibility:visible}
  #rcPrint{position:fixed;inset:0;margin:0;width:auto;box-shadow:none}}

/* ---------- N7: แชท (AI / ผู้ดูแล) ---------- */
.chat-fab{position:absolute;right:16px;bottom:84px;z-index:260;width:52px;height:52px;border-radius:50%;
  border:0;background:var(--primary);color:#fff;display:grid;place-items:center;cursor:pointer;
  box-shadow:0 8px 22px rgba(37,99,235,.5)}
.chat-fab svg{width:24px;height:24px}
.chat-fab:active{transform:scale(.94)}
.chat-pick{display:flex;flex-direction:column;gap:10px}
.chat-opt{display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;cursor:pointer;
  border:1px solid var(--line-2);background:var(--surface-2);text-align:left}
.chat-opt:active{transform:scale(.99)}
.chat-opt .co-ic{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center}
.chat-opt .co-ic svg{width:22px;height:22px}
.chat-opt h3{margin:0;font-size:14.5px;font-weight:800}
.chat-opt p{margin:2px 0 0;font-size:11.5px;color:var(--muted)}
.chat-thread{display:flex;flex-direction:column;gap:9px;max-height:46vh;overflow-y:auto;padding:2px 1px 4px}
.bub{max-width:80%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.5}
.bub.them{align-self:flex-start;background:var(--surface-3);border-bottom-left-radius:5px}
.bub.me{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:5px}
.bub .who{display:block;font-size:10px;font-weight:800;opacity:.7;margin-bottom:2px}
.chat-input{display:flex;gap:8px;margin-top:11px}
.chat-input input{flex:1;background:var(--surface-3);border:1px solid var(--line-2);border-radius:12px;
  padding:11px 13px;color:var(--ink);font-family:inherit;font-size:13.5px}
.chat-input button{flex:none;width:46px;border:0;border-radius:12px;background:var(--primary);color:#fff;
  display:grid;place-items:center;cursor:pointer}
.chat-input button svg{width:20px;height:20px}
</style>
</head>
<body>
<div class="device">
  <div class="notch"></div>

  <!-- status bar -->
  <div class="statusbar">
    <span id="clock">07:42</span>
    <div class="sb-r">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 4v16"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.5a10 10 0 0 1 14 0M8.5 16a5 5 0 0 1 7 0M2 9a15 15 0 0 1 20 0"/><circle cx="12" cy="19.5" r="1" fill="currentColor"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M22 11v2" stroke-linecap="round"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- app bar -->
  <div class="appbar">
    <div class="brand">
      <div class="logo">L</div>
      <div>
        <div class="nm">LOO <span style="color:var(--primary-ink)">Driver</span></div>
        <div class="sub">VARI · ນ້ຳດື່ມ</div>
      </div>
      <div class="appbar-right">
        <div class="offpill" id="offpill" onclick="toggleOff()" title="ບໍ່ມີເນັດກໍເຮັດວຽກໄດ້ · sync ເມື່ອມີເນັດ">
          <span id="offico"></span><span id="offtx">ເນັດດີ</span>
        </div>
        <div class="gpspill" id="gpspill" title="ກຳລັງສົ່ງພິກັດ GPS ເຂົ້າຫຼັງບ້ານ">
          <span class="gpsdot"></span> GPS
        </div>
      </div>
    </div>
  </div>

  <!-- scroll content -->
  <div class="scroll" id="scroll"></div>

  <!-- N7: FAB แชท (AI / ผู้ดูแล) · ลอยมุมขวาล่าง · ซ่อนบน login/shift · ไอคอนเติมโดย JS -->
  <button class="chat-fab hide" id="chatFab" onclick="openChatPick()" title="ແຊທ AI / ຜູ້ດູແລ"></button>

  <!-- bottom nav -->
  <div class="tabbar" id="tabbar">
    <button data-tab="run" class="on" onclick="go('run')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 14h5"/></svg>
      ວຽກ
      <span class="badge" id="runBadge">30</span>
    </button>
    <button data-tab="map" onclick="go('map')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M9 4 4 6v14l5-2 6 2 5-2V4l-5 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg>
      ແຜນທີ່
    </button>
    <button data-tab="money" onclick="go('money')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20M6 15h4"/></svg>
      ກະເປົ໋າ
    </button>
    <button data-tab="me" onclick="go('me')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      ຂ້ອຍ
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <!-- modal (bottom-sheet) -->
  <div class="modal-mask" id="mmask" onclick="if(event.target===this)closeM()">
    <div class="modal">
      <div class="mh"><b id="mtitle"></b><button class="mx" onclick="closeM()">✕</button></div>

/* หาตัว catalog จากชื่อรายการ (test match keyword)
   ⚠️ ลำดับสำคัญ (more specific first · กัน keyword กว้างกินตัวเฉพาะ):
   - "บาดำ" ต้องเจอก่อน "ถัง" ทั่วไป
   - Mini Blue/Pink ต้องเจอก่อน "ขวด 250" PET ทั่วไป (ทั้งคู่เป็น 250ml) */
function catOf(nm){
  if(/ບາດຳ/.test(nm))return VARI_CATALOG.find(c=>c.code==='VARIJUBPUR18000EA');
  if(/Mini Blue|ຟ້າ/.test(nm))return VARI_CATALOG.find(c=>c.code==='VARIPETPUR250CSMBL');
  if(/Mini Pink|ບົວ/.test(nm))return VARI_CATALOG.find(c=>c.code==='VARIPETPUR250CSMPK');
  return VARI_CATALOG.find(c=>c.match.test(nm))||null;
}
/* priceOf(nm) → ราคาขายจริงจาก catalog · ไม่เจอ → 0 + warn (กันยอดเพี้ยนเงียบ) */
function priceOf(nm){
  const c=catOf(nm);
  if(!c){console.warn('priceOf: ບໍ່ພົບສິນຄ້າໃນ VARI_CATALOG →',nm);return 0;}
  return c.price;
}
/* depositOf(nm) → ค่ามัดจำภาชนะ/หน่วย (ถัง 50000 · บาดำ 20000 · แก้ว 400000/ลัง · PET 0) */
function depositOf(nm){const c=catOf(nm);return c?c.deposit:0;}
/* seed รายการ+ราคาของจุด → [{nm,qty,price}] ที่ sum(price×qty) == amt เดิมเป๊ะ
   ปรับ price "line สุดท้าย" ให้ดูดส่วนต่าง (เช่น ดาวเฮือง 500ml=15000 ตาม data จุดนั้น) → ยอดเดิมไม่เพี้ยน */
function seedItems(items, amt){
  const lines=items.map(it=>({nm:it[0],qty:it[1],price:priceOf(it[0])}));
  const diff=amt-lines.reduce((a,l)=>a+l.price*l.qty,0);
  if(diff!==0){const last=lines[lines.length-1];if(last&&last.qty>0)last.price+=Math.round(diff/last.qty);}
  return lines;
}
/* ยอดรวมสด จาก stItems (state งานหน้า) · หัก stDiscount → สุทธิ (ค่าน้ำอย่างเดียว) */
function stopSubtotal(){return stItems.reduce((a,l)=>a+l.price*l.qty,0);}
function stopTotal(){return Math.max(0,stopSubtotal()-stDiscount);}
/* ค่ามัดจำภาชนะ (คืนได้) = Σ(qty × deposit ของ item ที่ ret≠none) · คิดเฉพาะเมื่อ stDeposit เปิด (ลูกค้าใหม่)
   เช่น ถัง 6 ใบ × 50000 = 300000 · PET deposit=0 → ไม่คิด */
function stopDepositTotal(){
  if(!stDeposit)return 0;
  return stItems.reduce((a,l)=>a+depositOf(l.nm)*l.qty,0);
}
/* ยอดที่คนขับเก็บจริง = ค่าน้ำ(สุทธิ) + ค่ามัดจำ */
function stopGrandTotal(){return stopTotal()+stopDepositTotal();}

/* ============== T5: บรรจุภัณฑ์คืน แยกประเภท (ถัง·ลัง) ==============
   ret:{barrel,crate} · seed จาก field ret ของ VARI_CATALOG (catOf → ret type)
   ⚠️ ของจริง: คืนได้เฉพาะ "ถัง (barrel)" + "แก้ว/ลัง (crate)" · ขวด PET ทุกตัว = ใช้แล้วทิ้ง ไม่คืน ไม่มีมัดจำ (ตัด pack ออก · Principle #3 ของจริงก่อน)
   barrel = ตรง bottle เดิม (ถังเท่านั้น) อัตโนมัติ → เชื่อม F1 เดิมไม่เพี้ยน */
const RETMETA={
  barrel:{lab:'ຖັງ',unit:'ໃບ',ic:'bottle'},   // ถัง 18L คืน (TH: ถัง / ใบ)
  crate:{lab:'ລັງ',unit:'ລັງ',ic:'crate'}      // ลังแก้ว 300/500ml คืน (TH: ลัง / ลัง)
};
const RETKEYS=['barrel','crate'];
/* seed ret จาก items ของจุด (single source · อ้าง field ret ของ catalog · PET ret='none' → ไม่ seed) */
function seedRet(items){
  const r={barrel:0,crate:0};
  (items||[]).forEach(it=>{const c=catOf(it[0]);
    if(c&&(c.ret==='barrel'||c.ret==='crate'))r[c.ret]+=it[1];});
  return r;
}
/* retDone() — sum บรรจุภัณฑ์คืนแยกประเภท จากจุด done (แทน bottlesDone scalar · เชื่อม F1) */
function retDone(){
  const t={barrel:0,crate:0};
  STOPS.filter(s=>s.status==='done').forEach(s=>{const r=s.ret||seedRet(s.items);
    RETKEYS.forEach(k=>t[k]+=(r[k]||0));});
  return t;
}
/* retLabel(obj) → "ຖັງ X · ລັງ Y · ແພັກ Z" (เฉพาะประเภทที่ >0 · ถ้าว่างหมด → "0 ໃບ") */
function retLabel(o){o=o||{};
  const parts=RETKEYS.filter(k=>(o[k]||0)>0).map(k=>RETMETA[k].lab+' '+o[k]);
  return parts.length?parts.join(' · '):'0';
}
/* รวมจำนวนชิ้นทุกประเภท (ใช้เลขรวมตรงจุดที่ต้องการ scalar เดียว · เช่น chip รายการ) */
function retSum(o){o=o||{};return RETKEYS.reduce((a,k)=>a+(o[k]||0),0);}

}

/* รับงาน → push เข้า STOPS (status:'pending') + RUN.total++ + toast + re-render หน้า run */
function acceptIncoming(){
  const job=incPending; if(!job)return;
  if(!STOPS.some(s=>s.id===job.id)){
    STOPS.push(Object.assign({},job,{status:'pending'})); // เข้าระบบงานปกติ (openStop/openRunStops ได้เลย)
    RUN.total++;
  }
  incIdx++; incPending=null;
  $('jobbanner').classList.remove('show');
  const rb=$('runBadge'); if(rb) rb.textContent=RUN.total-RUN.done; // badge tab ວຽກ = งานคงเหลือ
  toast('ຮັບວຽກດ່ວນແລ້ວ · +1 ຈຸດ');
  if(SCREENS._cur==='run') SCREENS.run(); // เห็นจุดใหม่ในรายการทันที (ไม่กระทบ ring เดิม)
}

/* ดูทีหลัง → ซ่อน banner · เก็บงานค้าง + แสดง badge ที่ปุ่ม trigger/tab */

  $('jobbanner').classList.remove('show');

}

/* enum = canonical ตรงหลังบ้าน (CASH/QR_CODE/BANK_TRANSFER/OUTSTANDING) · sel=CSS suffix · accum=ตัวรวมยอด · lab=ลาวที่ UI */
const PAYMETA={
  CASH:{ic:'cash',cls:'c-cash',lab:'ເງິນສົດ',sel:'cash',tone:'var(--green)',bg:'var(--green-soft)',accum:'cash'},
  QR_CODE:{ic:'qr',cls:'c-qr',lab:'QR',sel:'qr',tone:'var(--purple)',bg:'var(--purple-soft)',accum:'qr'},
  BANK_TRANSFER:{ic:'bank',cls:'c-transfer',lab:'ໂອນ',sel:'transfer',tone:'var(--blue)',bg:'var(--blue-soft)',accum:'transfer'},
  OUTSTANDING:{ic:'debt',cls:'c-credit',lab:'ຄ້າງ (ໜີ້)',sel:'credit',tone:'var(--red)',bg:'var(--red-soft)',accum:'credit'}};
function toast(msg){const t=$('toast');t.innerHTML=I.check+'<span>'+msg+'</span>';t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2200);}
function setTab(name){document.querySelectorAll('.tabbar button').forEach(b=>
  b.classList.toggle('on',b.dataset.tab===name));}

/* modal */
function modal(title,body,foot){$('mtitle').innerHTML=title;$('mbody').innerHTML=body;
  $('mfoot').innerHTML=foot||'';$('mmask').classList.add('show');}
function closeM(){$('mmask').classList.remove('show');}

/* ============== แจ้งลูกค้าอัตโนมัติ (customer notification) ============== */
/* mock ส่ง WhatsApp/SMS → ใช้ช่องเดียวกับ broadcast/SMS หลังบ้าน V2 (V2 มี broadcast)
   toast แสดง "ข้อความที่ลูกค้าจะได้รับจริง" · ไอคอน mono (I.send) ไม่ใช่ emoji */
function notifyCust(type, stop){
  const s=stop||curStop; if(!s)return;
  const nm=s.nm||'';
  const reason=(s.failReason)?s.failReason:'ບໍ່ມີຄົນຢູ່';
  // ข้อความที่ลูกค้าได้รับจริง (ตาม enum type) — Lao เขียนติดกัน
  const MSG={
    otw:  'ນ້ຳ VARI ກຳລັງໄປສົ່ງ ~15 ນາທີ',
    done: 'ສົ່ງສຳເລັດ · ຍອດ '+kip(s.amt)+' ₭ · ຂອບໃຈ',
    fail: 'ຂໍໂທດ ເລື່ອນສົ່ງ ('+reason+') · ນັດໃໝ່ໃນໄວໆ'
  };
  const body=MSG[type]; if(!body)return;
  // mock channel: ใช้ช่อง broadcast/SMS หลังบ้าน (เดียวกับ V2 broadcast)
  const CustNotify={to:nm, channel:'WhatsApp/SMS', type:type, text:body, time:nowHM()};
  console.log('CustNotify →',CustNotify); // (mock) ส่งผ่าน broadcast/SMS gateway หลังบ้าน V2
  // toast = ไอคอน send (mono) + ข้อความที่ลูกค้าจะเห็นจริง
  const t=$('toast');
  t.innerHTML=I.send+'<span>ລູກຄ້າ '+nm+' ໄດ້ຮັບ: "'+body+'"</span>';
  t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2800);
}

const CREW=[{nm:'ທ້າວ ສົມພອນ',role:'ຄົນຂັບ',on:true},{nm:'ບຸນມີ',role:'ຍົກຍໍ',on:true}];
const VEH={odo:84210, fuelRate:3.7};
const PAY={base:1800000, perStop:25000, ptBonus:140000, ot:90000, deduct:30000};

/* offline-first (บรีฟ: เส้นตาย) */
window._offline=false; window._queue=0;
function toggleOff(){window._offline=!window._offline;updOff();
  toast(window._offline?'ໂໝດອອບລາຍ · ວຽກຈະ sync ເມື່ອມີເນັດ':'ອອນລາຍ · sync ແລ້ວ');}
function updOff(){const p=$('offpill');if(!p)return;
  p.classList.toggle('off',window._offline);
  $('offico').innerHTML=I.wifi;
  $('offtx').textContent=window._offline?('ອອບລາຍ · ຄ້າງ '+window._queue):'ເນັດດີ';}

/* check-in / out */
function checkToggle(){PRETRIP.checkin=!PRETRIP.checkin;
  toast(PRETRIP.checkin?'ເຊັກອິນ '+nowHM()+' · ເລີ່ມຈັບເວລາ':'ເຊັກເອົາແລ້ວ · ສະຫຼຸບກະສົ່ງຫົວໜ້າ');
  if(SCREENS._cur==='shift')SCREENS.shift();else if(SCREENS._cur==='me')SCREENS.me();}
function nowHM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

/* ตรวจรถก่อนออก (vehInspect) — checklist 7 จุด (น้ำดื่ม) */
const INSPECT=['ຢາງລົດ','ເບຣກ','ໄຟໜ້າ / ໄຟທ້າຍ','ນ້ຳມັນເຄື່ອງ','ນ້ຳ / ໝໍ້ນ້ຳ','ຄວາມສະອາດຕູ້ນ້ຳ','ຖັງດັບເພີງ'];
function openInspect(){
  const rows=INSPECT.map((t,i)=>`<div class="chk-row">
    <div class="chk on" onclick="toggleChk(this)">
      <div class="box">${I.check}</div><div class="lab">${t}</div>
      <button class="chk-note" onclick="event.stopPropagation();toggleNote(this)">${I.camera}</button>
    </div>
    <div class="chk-detail hide">
      <textarea rows="2" placeholder="ໝາຍເຫດ / ບັນຫາທີ່ພົບ"></textarea>
      <div class="photo-tile mini" onclick="this.classList.add('has')">
        <div class="fake-img"><span class="geo-stamp">ຮູບ + GPS + ${nowHM()}</span></div>
        <div class="ph-text" style="display:flex;flex-direction:column;align-items:center;gap:6px">${I.camera}<span>ແນບຮູບຈຸດນີ້</span></div>
      </div>
    </div></div>`).join('');
  modal(`${I.clip} ກວດລົດກ່ອນອອກ`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>ແຕະຈຸດທີ່ມີບັນຫາເພື່ອປົດເຊັກ → ພິມລາຍລະອຽດ + ແນບຮູບໄດ້</span></p>
     <div style="margin-bottom:8px">${rows}</div>
     <div class="field"><label>ເລກໄມລ໌ ເລີ່ມ (ກມ.)</label><input class="mono" id="odo" value="${VEH.odo}"></div>`,
    `<button class="btn ghost-red" onclick="closeM();openSOS()">ແຈ້ງບັນຫາລົດ</button>
     <button class="btn green" onclick="doneStep('inspect')">ຜ່ານ · ພ້ອມອອກ</button>`);
}
function toggleChk(el){el.classList.toggle('on');
  const row=el.closest('.chk-row'),det=row.querySelector('.chk-detail');
  if(!el.classList.contains('on')){det.classList.remove('hide');row.querySelector('.chk-note').classList.add('has');}}
function toggleNote(btn){btn.closest('.chk-row').querySelector('.chk-detail').classList.toggle('hide');btn.classList.add('has');}

/* สแกนคน(ยกยอ)ขึ้นรถ — scanWorker pattern (มือถือติดรถ · พนักงานยื่นบัตร QR สแกน ไม่ต้องมีแอป) */
function crewRow(c,i){return `<div class="crew-row"><div class="cr-ic">${I.user}</div>
  <div style="flex:1"><b style="font-size:14px">${c.nm}</b><div class="pdesc">${c.role}</div></div>
  <button class="crew-tog ${c.on?'on':''}" onclick="crewTog(${i},this)">${c.on?'ຂຶ້ນລົດ':'ລົງ'}</button></div>`;}
function crewTog(i,btn){CREW[i].on=!CREW[i].on;btn.classList.toggle('on',CREW[i].on);btn.textContent=CREW[i].on?'ຂຶ້ນລົດ':'ລົງ';}
function openCrew(){
  modal(`${I.users} ສະແກນຄົນຂຶ້ນລົດ`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>ຄົນເຮັດວຽກໃນລົດມື້ນີ້ · ຍື່ນບັດ QR ພະນັກງານສະແກນ (ບໍ່ຕ້ອງມີແອັບ) → ລົງເວລາໃຫ້ອັດຕະໂນມັດ</span></p>
     <div id="crewlist">${CREW.map((c,i)=>crewRow(c,i)).join('')}</div>
     <div class="scan-btn" style="margin:14px 0 0" onclick="toast('ສະແກນ QR ບັດພະນັກງານແລ້ວ · +1 ຄົນ')">${I.scan} ສະແກນ QR ບັດພະນັກງານເພີ່ມ</div>`,
    `<button class="btn" onclick="closeM()">ປິດ</button>
     <button class="btn green" onclick="doneStep('crew')">ຢືນຢັນຄົນຄົບ</button>`);
}

/* โหลดน้ำขึ้นรถ (ยิง&รับถัง — V1: TruckLoad + damage-loss + แหล่งรับ/ผู้จ่าย) */
const LOAD=[{nm:'ນ້ຳຖັງ 18L',qty:120,dmg:0},{nm:'ນ້ຳແກ້ວ 500ml (ລັງ)',qty:45,dmg:0},{nm:'ນ້ຳຂວດ 250 ມລ. (ແພັກ)',qty:30,dmg:0}];
const DMGR=['ແຕກ','ຮົ່ວ','ຂາດ'];
const SRC={wh:'ສາງໃຫຍ່ VARI',issuer:''};
const stBtn='width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--surface-2);color:var(--ink);font-size:20px;line-height:1;cursor:pointer;flex:none';
function loadRow(it,i){return `<div style="padding:11px 0;border-bottom:1px solid var(--line)">
   <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
     <span style="font-size:14px">${it.nm}</span>
     <div style="display:flex;align-items:center;gap:6px">
       <button onclick="loadAdj(${i},-1)" style="${stBtn}">−</button>
       <input class="mono" id="lq${i}" value="${it.qty}" onchange="loadSet(${i},this.value)" inputmode="numeric" style="width:56px;text-align:center;padding:7px 4px">
       <button onclick="loadAdj(${i},1)" style="${stBtn}">+</button>
       <span style="font-size:12px;color:var(--muted)">ໃບ</span>
     </div>
   </div>
   <button id="ldb${i}" onclick="loadDmg(${i})" style="margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid ${it.dmg?'#5c2528':'var(--line-2)'};background:${it.dmg?'var(--red-soft)':'transparent'};color:${it.dmg?'var(--red-ink)':'var(--muted)'};cursor:pointer"><span style="display:inline-flex;width:14px;height:14px;flex:none">${I.alert}</span> ${it.dmg?('ເສຍຫາຍ '+it.dmg+' ໃບ'):'ແຈ້ງເສຍຫາຍ'}</button>
   <div class="hide" id="ld${i}" style="margin-top:9px">
     <div class="frow"><div class="field"><label>ເສຍຫາຍ (ໃບ)</label><input class="mono" id="ldn${i}" value="${it.dmg}" inputmode="numeric"></div>
       <div class="field"><label>ເຫດ</label><select id="ldr${i}">${DMGR.map(r=>`<option>${r}</option>`).join('')}</select></div></div>
     <div class="photo-tile mini" onclick="this.classList.add('has')"><div class="fake-img"><span class="geo-stamp">ຮູບ + ${nowHM()}</span></div>
       <div class="ph-text" style="display:flex;flex-direction:column;align-items:center;gap:6px">${I.camera}<span>ແນບຮູບຂອງເສຍ</span></div></div>
     <button class="btn green" style="margin-top:9px;width:100%;padding:10px;font-size:13px" onclick="loadDmgSave(${i})">ບັນທຶກເສຍຫາຍ</button>
   </div>
 </div>`;}
function loadSumHtml(){const rec=LOAD.reduce((s,i)=>s+i.qty,0),dmg=LOAD.reduce((s,i)=>s+i.dmg,0);
  return `<div class="kv"><span>ຮັບຈິງ</span><b class="mono">${rec} ໃບ</b></div>
   <div class="kv"><span style="color:var(--red-ink)">ເສຍຫາຍ</span><b class="mono" style="color:var(--red-ink)">${dmg} ໃບ</b></div>
   <div class="kv" style="border-top:1px solid var(--line);margin-top:4px;padding-top:10px"><span><b>ຂາຍໄດ້ຈິງ</b></span><b class="mono">${rec-dmg} ໃບ</b></div>`;}
function openLoad(){
  modal(`${I.box} ໂຫຼດນ້ຳຂຶ້ນລົດ`,
    `<div style="background:var(--surface-2);border-radius:var(--radius);padding:4px 13px;margin-bottom:6px">
       <div class="kv"><span>${I.pin} ຮັບຈາກ</span><b>${SRC.wh}</b></div>
       <div class="kv" style="border-bottom:0"><span>${I.user} ຜູ້ຈ່າຍ</span><b id="lissuer" style="color:var(--muted)">— ຍັງບໍ່ຍິງ —</b></div>
     </div>
     <div class="scan-btn" style="padding:9px;font-size:13px" onclick="loadScanIssuer()">${I.scan} ຍິງ QR ບັດຜູ້ຈ່າຍ (ສາງ)</div>
     <p class="hint" style="margin-top:10px">${I.alert}<span>ຍິງ QR ຖັງ/ລັງ → ໂອນສະຕັອກ ສາງ → ລົດ · ແຕະ +/− ຫຼືພິມແກ້ຈຳນວນ · ພົບຂອງເສຍ ກົດ ແຈ້ງເສຍຫາຍ</span></p>
     <div id="loadlist">${LOAD.map((it,i)=>loadRow(it,i)).join('')}</div>
     <div class="scan-btn" style="margin-top:10px" onclick="loadScanAdd()">${I.scan} ຍິງ QR ຖັງ/ລັງ ເພີ່ມ</div>
     <div id="loadsum" style="margin-top:12px">${loadSumHtml()}</div>`,
    `<button class="btn" onclick="closeM()">ປິດ</button>
     <button class="btn green" onclick="doneStep('load')">ຢືນຢັນໂຫຼດຄົບ</button>`);
}
function loadRefresh(){const s=$('loadsum');if(s)s.innerHTML=loadSumHtml();}
function loadRelist(){const l=$('loadlist');if(l)l.innerHTML=LOAD.map((it,i)=>loadRow(it,i)).join('');loadRefresh();}
function loadAdj(i,d){LOAD[i].qty=Math.max(0,LOAD[i].qty+d);const f=$('lq'+i);if(f)f.value=LOAD[i].qty;loadRefresh();}
function loadSet(i,v){LOAD[i].qty=Math.max(0,parseInt(v)||0);loadRefresh();}
function loadDmg(i){const d=$('ld'+i);if(d)d.classList.toggle('hide');}
function loadDmgSave(i){LOAD[i].dmg=Math.max(0,parseInt(($('ldn'+i)||{}).value)||0);const r=($('ldr'+i)||{}).value||'';
  loadRelist();toast(LOAD[i].dmg?('ບັນທຶກເສຍຫາຍ '+LOAD[i].dmg+' ໃບ ('+r+') → damage-loss'):'ບໍ່ມີຂອງເສຍ');}
function loadScanIssuer(){SRC.issuer='ຈັນດີ (ສາງ)';const e=$('lissuer');if(e){e.textContent=SRC.issuer;e.style.color='var(--ink)';}toast('ຍິງ QR ຜູ້ຈ່າຍແລ້ວ · ຈັນດີ');}

function renderStops(f){
  const order=['now','pending','failed','done'];
  let list=[...STOPS].sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status)||a.dist-b.dist);
  if(f==='pending')list=list.filter(s=>s.status==='pending'||s.status==='now'); // ตัด failed ออกจาก "ยัง" (failed=จบแล้ว)
  if(f==='done')list=list.filter(s=>s.status==='done');
  if(f==='failed')list=list.filter(s=>s.status==='failed');
  let n=0;
  $('stoplist').innerHTML=list.map(s=>{
    n++;const pm=PAYMETA[s.pay];
    const statusChip=s.status==='done'
      ? `<span class="chip c-ok">${I.check} ${s.time}</span>`
      : s.status==='now' ? `<span class="chip c-warn">${I.pin} ກຳລັງໄປ</span>`
      : s.status==='failed' ? `<span class="chip c-credit">${I.x} ສົ່ງບໍ່ໄດ້</span>` : '';
    return `<div class="stop ${s.status}" onclick="openStop('${s.id}')">
      <div class="stnum">${s.status==='done'?I.check:s.status==='failed'?I.x:n}</div>
      <div class="stbody">
        <div class="nm">${s.nm}</div>
        <div class="addr">${I.pin} ${s.addr}</div>
        ${s.status==='failed'&&s.failReason?`<div class="addr" style="color:var(--red-ink)">${I.alert} ${s.failReason}</div>`:''}
        <div class="stmeta">
          <span class="chip ${pm.cls}">${I[pm.ic]} ${pm.lab}</span>
          ${retSum(s.ret||seedRet(s.items))?`<span class="tag-bottle">${I.bottle} ${retSum(s.ret||seedRet(s.items))} ໃບ</span>`:''}
          ${statusChip}

        <span class="dist">${I.pin} ${s.dist} ກມ.</span>

}

/* ส่งไม่ได้ — เหตุผล (cFail pattern) */
const FAILR=['ບໍ່ມີຄົນຢູ່ / ຮ້ານປິດ','ລູກຄ້າປະຕິເສດ / ເລື່ອນ','ໂທບໍ່ຕິດ','ນັດໃໝ່ພາຍຫຼັງ','ອື່ນໆ'];
function failStop(){

    `<button class="btn" onclick="closeM()">ຍົກເລີກ</button>
     <button class="btn ghost-red" onclick="failSave()">ບັນທຶກ</button>`);

let _failBusy=false; // ກັນບັນທຶກ "ສົ່ງບໍ່ໄດ້" ຊ້ຳ (กดรัว → แจ้งลูกค้า/ปิดงานซ้ำ)
function failSave(){
  if(_failBusy)return; _failBusy=true;
  const reason=($('failR')||{}).value||FAILR[0];
  const note=($('failNote')||{}).value||'';
  curStop.status='failed'; curStop.failReason=reason; curStop.failNote=note;
  curStop.time=new Date().toTimeString().slice(0,5);
  closeM();
  toast('ບັນທຶກ: ສົ່ງບໍ່ໄດ້ · '+reason+' → ການສົ່ງທີ່ຕ້ອງໃສ່ໃຈ');
  const failed=curStop;
  setTimeout(()=>notifyCust('fail',failed),900); // แจ้งลูกค้า: เลื่อนส่ง
  setTimeout(()=>{go('run');_failBusy=false;},1900); // reset หลังกลับหน้างาน (จุดถัดไปเริ่มใหม่)
}

function stItemsHtml(){
  if(!stItems.length)return `<div style="padding:14px 0;text-align:center;color:var(--muted);font-size:13px">ຍັງບໍ່ມີລາຍການ — ກົດ "ເພີ່ມລາຍການ"</div>`;

      <button onclick="stQty(${i},1)">${I.plus}</button>

  </div>`).join('');

/* ปรับจำนวน → ลบเหลือ 0 = ตัดออกจากรายการ · re-render รายการ + สรุป + ปุ่มยืนยัน */
function stQty(i,d){const l=stItems[i];if(!l)return;l.qty=Math.max(0,l.qty+d);
  if(l.qty===0)stItems.splice(i,1);
  if(stPromo)reapplyPromo(); // ยอดเปลี่ยน → คิดส่วนลดใหม่ (กัน BULK5 ต่ำกว่าขั้นต่ำ)
  stRefresh();}

function stAdd(i){const sku=SELLSKU[i];const line=stItems.find(l=>l.nm===sku.nm);
  if(line)line.qty++;else stItems.push({nm:sku.nm,qty:1,price:sku.price});
  if(stPromo)reapplyPromo();
  closeM();stRefresh();}

/* สรุป: ยอดเต็ม / ส่วนลด / ค่าน้ำสุทธิ / (ถ้ามัดจำเปิด) ค่ามัดจำ + ยอดรวมที่เก็บ */

  if(dep>0){
    // มัดจำเปิด → แยกบรรทัด ค่าน้ำ / ค่ามัดจำ(คืนได้) / ยอดรวมที่เก็บ

/* ใช้โค้ดส่วนลด → เช็ก PROMO → คำนวณ stDiscount → re-render */
function applyPromo(){
  const code=((($('promoCode')||{}).value)||'').trim().toUpperCase();
  if(!code){toast('ໃສ່ໂຄ້ດສ່ວນຫຼຸດກ່ອນ');return;}
  const p=PROMO[code];
  if(!p){toast('ໂຄ້ດບໍ່ຖືກຕ້ອງ: '+code);stDiscount=0;stPromo=null;stRefresh();return;}
  stPromo=code;reapplyPromo();
  if(stDiscount<=0&&p.type!=='free'){ // min ไม่ถึง → แจ้ง + ยกเลิก
    toast('ຍອດບໍ່ເຖິງຂັ້ນຕ່ຳ '+kip(p.min)+' ₭ ສຳລັບ '+code);stPromo=null;}
  else toast('ໃຊ້ສ່ວນຫຼຸດ '+code+' ແລ້ວ');
  stRefresh();
}
/* คำนวณ stDiscount จาก stPromo + ยอดปัจจุบัน (เรียกซ้ำได้เมื่อ qty เปลี่ยน) */
function reapplyPromo(){
  const p=PROMO[stPromo];if(!p){stDiscount=0;return;}
  const sub=stopSubtotal();
  if(p.type==='pct'){
    if(p.min&&sub<p.min){stDiscount=0;return;}
    stDiscount=Math.round(sub*p.v/100);
  }else if(p.type==='free'){ // ซื้อ 10 ถัง แถม 1 = หักราคาถัง 1 ใบ (ทุกครบ 10 ถัง)
    const barrelLine=stItems.find(l=>/ຖັງ/.test(l.nm));
    const barrelQty=barrelLine?barrelLine.qty:0;
    const freeN=Math.floor(barrelQty/10);
    stDiscount=freeN>0&&barrelLine?freeN*barrelLine.price:0;
  }
}

/* mini map นำทาง — route ตามถนนจริง (OSRM · guarded+fallback) + จุดเป้าหมายเด่น + จุดอื่นจาง (โฟกัส)
   เลเยอร์ z (จาง→เด่น): ลูกค้าทั้งหมด(จางมาก) → จุดส่งอื่นวันนี้(จาง) → route → คนขับ → เป้าหมาย(เด่นสุด) */
function initNavMap(stop){
  const el=document.getElementById('navmap'); if(!el||typeof L==='undefined')return;
  if(NAVMAP){NAVMAP.remove();NAVMAP=null;}
  const m=L.map('navmap',{zoomControl:false,attributionControl:false,dragging:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(m);

  // ชื่อจุดส่งวันนี้ (กันซ้ำเลเยอร์ลูกค้า) + ตัวเป้าหมาย
  const todayNames=new Set(STOPS.map(s=>s.nm));

  // เลเยอร์จางสุด: ลูกค้าทั้งหมดที่รับผิดชอบ — CUSTDB นอกคิววันนี้ + จุดในเขตดูแล (mock) · บริบทพื้นที่ดูแล
  Object.keys(CUSTDB).forEach(nm=>{
    const c=CUSTDB[nm]; if(!c||c.lat==null||c.lng==null||todayNames.has(nm))return;
    L.marker([c.lat,c.lng],{icon:dmapDot('#64748B',4,.28),interactive:false}).addTo(m); // ลูกค้าในพื้นที่ (จางมาก · ไม่คลิก)
  });
  const RESPONSIBLE=[{lat:17.9620,lng:102.5980},{lat:17.9880,lng:102.6050},{lat:17.9410,lng:102.6280},{lat:17.9760,lng:102.5910},{lat:17.9550,lng:102.6420},{lat:17.9930,lng:102.6210},{lat:17.9480,lng:102.5850},{lat:17.9690,lng:102.6480},{lat:17.9840,lng:102.6350},{lat:17.9370,lng:102.6150},{lat:17.9580,lng:102.6010},{lat:17.9790,lng:102.6440}];
  RESPONSIBLE.forEach(p=>L.marker([p.lat,p.lng],{icon:dmapDot('#475569',3,.26),interactive:false}).addTo(m)); // ลูกค้าในเขตดูแลทั้งหมด (จางสุด · บริบท)

  // เลเยอร์จาง: จุดส่งอื่นวันนี้ (STOPS != เป้าหมาย) — เห็นว่าวันนี้มีจุดไหนอีก
  STOPS.forEach(s=>{
    if(s===stop||s.nm===stop.nm||s.lat==null||s.lng==null)return;
    L.marker([s.lat,s.lng],{icon:dmapDot('#94A3B8',5,.45)}).addTo(m)
      .bindTooltip(s.nm,{className:'maptip',direction:'top',opacity:.7}); // จุดส่งอื่น (จาง)
  });

  // เส้นนำทาง fallback (เส้นตรง dashed) — แสดงทันทีระหว่างรอ OSRM · ถ้า route จริงโหลดได้จะถูกแทนที่
  let routeLine=L.polyline([[DRIVER_POS.lat,DRIVER_POS.lng],[stop.lat,stop.lng]],
    {color:'#2563EB',weight:3,opacity:.7,dashArray:'4 6'}).addTo(m);

  // จุดคนขับ (น้ำเงินเด่น) + จุดเป้าหมาย (เขียวเด่น+glow · ใหญ่สุด) — เด่นท่ามกลางจุดจาง
  L.marker([DRIVER_POS.lat,DRIVER_POS.lng],{icon:dmapDot('#2563EB',8,1)}).addTo(m).bindTooltip('ລົດ',{className:'maptip',direction:'top'});
  L.marker([stop.lat,stop.lng],{icon:dmapDot('#22C55E',9,1)}).addTo(m).bindTooltip(stop.nm,{className:'maptip',direction:'top'});

  // fitBounds = route + เป้าหมาย + คนขับ (route เด่นกลางจอ · จุดจางอยู่รอบเป็นบริบท)
  const fit=ll=>{ try{ m.fitBounds(L.latLngBounds(ll),{padding:[42,42]}); }catch(e){} };
  fit([[DRIVER_POS.lat,DRIVER_POS.lng],[stop.lat,stop.lng]]);
  setTimeout(()=>m.invalidateSize(),150);
  NAVMAP=m;

  // route ตามถนนจริงจาก OSRM (guarded: timeout 4s · try/catch · ถ้า fail/CSP block → คงเส้นตรง dashed ไม่ error)
  fetchRealRoute(DRIVER_POS,stop).then(coords=>{
    if(!coords||!coords.length||NAVMAP!==m)return; // map ถูกปิด/เปลี่ยนแล้ว → ทิ้ง
    m.removeLayer(routeLine);                       // เอาเส้นตรง fallback ออก
    routeLine=L.polyline(coords,{color:'#1D4ED8',weight:4,opacity:.9}).addTo(m); // route จริง (น้ำเงินเข้ม solid)
    routeLine.bringToBack();                        // ใต้ marker เป้าหมาย/คนขับ
    fit(coords.concat([[DRIVER_POS.lat,DRIVER_POS.lng],[stop.lat,stop.lng]])); // refit ครอบ route จริง
  }).catch(()=>{}); // เงียบ — เส้นตรง dashed เดิมยังอยู่
}
/* ดึง route ถนนจริงจาก OSRM public · คืน [[lat,lng],...] หรือ null (timeout/offline/CSP → null = fallback) */
async function fetchRealRoute(from,to){
  const url=`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
  const ctrl=new AbortController(); const tid=setTimeout(()=>ctrl.abort(),4000); // timeout ~4s
  try{
    const r=await fetch(url,{signal:ctrl.signal}); clearTimeout(tid);
    if(!r.ok)return null;
    const j=await r.json();
    const g=j&&j.routes&&j.routes[0]&&j.routes[0].geometry&&j.routes[0].geometry.coordinates;
    if(!g||!g.length)return null;
    return g.map(p=>[p[1],p[0]]); // [lng,lat] → [lat,lng]
  }catch(e){ clearTimeout(tid); return null; } // abort/network/CSP → null → คงเส้นตรง
}

/* ---------- MAP (stylized route) ---------- */
let DMAP=null;
/* op = opacity 0..1 (default 1) · จาง = ไม่มี glow + border บาง (โฟกัสจุดเป้าหมาย/คนขับ · จุดอื่นถอยหลัง) */
function dmapDot(c,r,op){op=(op===undefined?1:op);
  const bw=op>=.85?2:1;                                  // border บางลงเมื่อจาง
  const glow=op>=.85?`box-shadow:0 0 0 2px ${c}66;`:'';  // glow เฉพาะจุดเด่น (เป้าหมาย/คนขับ)
  return L.divIcon({className:'',iconSize:[r*2,r*2],iconAnchor:[r,r],html:`<div style="width:${r*2-4}px;height:${r*2-4}px;border-radius:50%;background:${c};border:${bw}px solid #1E293B;opacity:${op};${glow}"></div>`});}
function initDmap(){
  const el=document.getElementById('dmap'); if(!el||typeof L==='undefined')return;
  if(DMAP){DMAP.remove();DMAP=null;}
  const now=STOPS.find(s=>s.status==='now')||STOPS.find(s=>s.status!=='done')||STOPS[0];
  const m=L.map('dmap',{zoomControl:false,attributionControl:false}).setView([now.lat,now.lng],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(m);
  L.polyline(STOPS.map(s=>[s.lat,s.lng]),{color:'#2563EB',weight:3,opacity:.55,dashArray:'3 7'}).addTo(m);
  STOPS.forEach(s=>{const c=s.status==='done'?'#22C55E':s.status==='now'?'#2563EB':'#475569';const r=s.status==='now'?9:6;
    L.marker([s.lat,s.lng],{icon:dmapDot(c,r)}).addTo(m)
      .bindTooltip(s.nm+' · '+kip(s.amt)+' ₭',{className:'maptip',direction:'top'})
      .on('click',()=>openStop(s.id));}); // คลิก marker → เปิดจุดส่งนั้น (drill ข้ามชั้น)
  setTimeout(()=>m.invalidateSize(),120);
  DMAP=m;
}

/* satisfaction map: SVG face 3 ระดับ (mono · currentColor · ไม่ใช่ emoji) + สี semantic + label */
const SAT={

  2:{c:'var(--amber-ink)',bg:'var(--amber-soft)',lab:'ເສີຍໆ'},
  3:{c:'var(--green-ink)',bg:'var(--green-soft)',lab:'ພໍໃຈ'}

/* วาดหน้า inline SVG: ตา 2 จุด + ปาก quadratic (บึ้ง=โค้งลง · เฉย=ตรง · ยิ้ม=โค้งขึ้น) */
function satSVG(lv){
  const eyes='<circle cx="9" cy="10" r=".9" fill="currentColor" stroke="none"/><circle cx="15" cy="10" r=".9" fill="currentColor" stroke="none"/>';
  const mouth=lv===1?'<path d="M8.3 16.4Q12 13 15.7 16.4"/>':lv===2?'<path d="M8.2 15.4H15.8"/>':'<path d="M8 15Q12 18.6 16 15"/>';
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/>${eyes}${mouth}</svg>`;
}
/* สถานะจัดส่งวันนี้ → chip (สี semantic) */
const DELIVST={
  done:{cls:'c-ok',ic:'check',lab:'ສົ່ງແລ້ວ'},
  otw:{cls:'c-cash',ic:'truck',lab:'ກຳລັງໄປ'},
  wait:{cls:'c-neutral',ic:'clock',lab:'ລໍຖ້າສົ່ງ'}
};
/* สถานะของแต่ละออเดอร์ในประวัติ */
const ORDST={
  done:{c:'var(--green-ink)',lab:'ສຳເລັດ'},
  otw:{c:'var(--blue-ink)',lab:'ກຳລັງສົ່ງ'},
  wait:{c:'var(--muted)',lab:'ລໍຖ້າ'},

/* mini Leaflet map ในโมดอลลูกค้า (guard instance · cartocdn dark · invalidateSize) */
let CUSTMAP=null;
function initCustMap(lat,lng,nm){
  const el=document.getElementById('custdmap'); if(!el||typeof L==='undefined')return;
  if(CUSTMAP){CUSTMAP.remove();CUSTMAP=null;}
  const m=L.map('custdmap',{zoomControl:false,attributionControl:false,dragging:true}).setView([lat,lng],15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(m);
  L.marker([lat,lng],{icon:dmapDot('#2563EB',9)}).addTo(m).bindTooltip(nm,{className:'maptip',direction:'top'});
  setTimeout(()=>m.invalidateSize(),150);
  CUSTMAP=m;
}
/* fallback record ขั้นต่ำ (ชื่อไม่มีใน CUSTDB → ไม่ error) */
function custFallback(nm){return {ref:'CUS-—',type:'ລູກຄ້າ',addr:'ບໍ່ມີຂໍ້ມູນທີ່ຢູ່',phone:'—',main:'—',

  const c=CUSTDB[nm]||custFallback(nm);

  const todayStop=STOPS.find(s=>s.nm===nm);

    const act=isToday?`closeM();openStop('${todayStop.id}')`:`toast('${(o[0]+'').replace(/'/g,"\\'")} · ${o[2]} · ${kip(o[1])} ₭ · ${st.lab}')`;

  modal(
    `<div style="display:flex;align-items:center;gap:9px"><div class="logo" style="background:var(--surface-3);color:var(--primary-ink)">${I.user}</div>

     <div class="hint" style="margin-top:9px;margin-bottom:6px">${I.alert}<span>ລະດັບປັດຈຸບັນ: <b style="color:${sv.c}">${sv.lab}</b> · ປະເມີນຈາກປະຫວັດການສົ່ງ + ຄຳຕິຊົມ</span></div>

     <div class="sec-label">ຂໍ້ມູນລູກຄ້າ</div>
     <div class="card" style="padding:4px 13px">
       <div class="kv"><span>ທີ່ຢູ່</span><b style="text-align:right;font-weight:600">${c.addr}</b></div>
       <div class="kv"><span>ສິນຄ້າຫຼັກ</span><b>${c.main}</b></div>
       <div class="kv"><span>ໜີ້ຄ້າງ</span><b class="mono" style="${c.debt>0?'color:var(--red-ink)':''}">${kip(c.debt)} ₭</b></div>
       <div class="kv"><span>ຖັງເປົ່າຄ້າງ</span><b class="mono" style="${c.bottle>10?'color:var(--amber-ink)':''}">${c.bottle} ໃບ</b></div>
     </div>

     <div class="sec-label">ປະຫວັດສັ່ງຊື້</div>
     <div class="report-sheet" style="padding:4px 13px">${hist}</div>

     <div class="sec-label">ຕຳແໜ່ງຈິງ</div>
     <div class="custmap"><div id="custdmap"></div></div>
     <div class="pdesc mono" style="text-align:center;margin-top:6px">${c.lat}, ${c.lng}</div>`,
    `<button class="btn" onclick="toast('ກຳລັງໂທ ${c.phone}')">${I.phone} ໂທ</button>
     <button class="btn primary" onclick="toast('ເປີດ Google Maps → ${c.lat},${c.lng}')">${I.nav} ນຳທາງ</button>`);
  setTimeout(()=>initCustMap(c.lat,c.lng,nm),120);
}

  BANK_TRANSFER:[{nm:'ໂຮງແຮມ ລ້ານຊ້າງ',amt:4160000,t:'08:55'},{nm:'ບໍລິສັດ ໄຊຂາວ',amt:3200000,t:'10:05'},{nm:'ໂຮງຮຽນ ສີໂຄດ',amt:1040000,t:'11:30'}],

function openWallet(payKey){
  const m=PAYMETA[payKey]; const list=WALLET[payKey]||[];
  const sum=list.reduce((a,x)=>a+x.amt,0);
  modal(`<span class="chip ${m.cls}">${I[m.ic]} ${m.lab}</span>`,
    `<p class="hint" style="margin-top:0">${I.alert}<span>ລາຍການ ${m.lab} ທີ່ເກັບມື້ນີ້ · ${list.length} ຈຸດ · ແຕະຊື່ເພື່ອເບິ່ງລາຍລະອຽດລູກຄ້າ</span></p>
     ${list.map(x=>`<div class="report-line" onclick="closeM();openCust('${x.nm.replace(/'/g,"\\'")}')" style="cursor:pointer"><div class="lab">${x.nm}<div class="pdesc mono">${x.t}</div></div><div class="vv">${kip(x.amt)} ₭ <span style="color:var(--muted-2);font-weight:400">›</span></div></div>`).join('')}
     <div class="report-line total"><div class="lab"><b>ລວມ ${m.lab}</b></div><div class="vv">${kip(sum)} ₭</div></div>`,
